tions": {"A": "機翼翼面。", "B": "尾翼翼面。", "C": "感測器。", "D": "以上皆是。"}, "answer": "D"}, {"id": 329, "chapter": 3, "chapterName": "氣象", "numberInChapter": 66, "question": "遙控無人機飛行時，於下列哪種情形可能發生積冰現象？", "options": {"A": "機體周遭氣溫為攝氏零度。", "B": "機體周遭氣溫為攝氏零度以下。", "C": "有可見水氣。", "D": "以上皆是。"}, "answer": "D"}, {"id": 330, "chapter": 3, "chapterName": "氣象", "numberInChapter": 67, "question": "當遙控無人機飛越結冰區域時，可能發生下列哪種狀況？", "options": {"A": "影響或誤判遙控無人機飛行性能表現。", "B": "提升遙控無人機飛行性能表現。", "C": "遙控無人機飛行性能表現可能變好或變壞。", "D": "不太可能發生任何狀況。"}, "answer": "A"}, {"id": 331, "chapter": 3, "chapterName": "氣象", "numberInChapter": 68, "question": "雷雨的發展循環不包含下列何者？", "options": {"A": "發展期。", "B": "成熟期。", "C": "重疊期。", "D": "消散期。"}, "answer": "C"}, {"id": 332, "chapter": 3, "chapterName": "氣象", "numberInChapter": 69, "question": "雷雨成熟期具有的特徵為何？", "options": {"A": "下沉氣流。", "B": "開始降水。", "C": "打雷。", "D": "以上皆是。"}, "answer": "D"}, {"id": 333, "chapter": 3, "chapterName": "氣象", "numberInChapter": 70, "question": "雷雨消散期具有的特徵為何？", "options": {"A": "降雨減緩。", "B": "下沉氣流減緩。", "C": "雷雨雹消散。", "D": "以上皆是。"}, "answer": "D"}, {"id": 334, "chapter": 3, "chapterName": "氣象", "numberInChapter": 71, "question": "臺北航空氣象中心隸屬於下列哪個機關？", "options": {"A": "交通部觀光局飛航服務總臺。", "B": "交通部民用航空局飛航服務總臺。", "C": "交通部中央氣象局飛航服務總臺。", "D": "交通部航政司飛航服務總臺。"}, "answer": "B"}, {"id": 335, "chapter": 3, "chapterName": "氣象", "numberInChapter": 72, "question": "遙控無人機操作人可透過中央氣象局網頁取得下列哪項資料？", "options": {"A": "天氣觀測資料。", "B": "天氣預報資料。", "C": "衛星雲圖。", "D": "以上皆是。"}, "answer": "D"}, {"id": 336, "chapter": 3, "chapterName": "氣象", "numberInChapter": 73, "question": "遙控無人機操作人可透過飛航服務總臺所建置之航空氣象服務網(AOAWS)取得下列哪項資料？", "options": {"A": "國內外主要機場之即時觀測資料。", "B": "國內機場6小時天氣預報資料。", "C": "太平洋地區衛星雲圖。", "D": "高空風溫圖。"}, "answer": "A"}, {"id": 337, "chapter": 3, "chapterName": "氣象", "numberInChapter": 74, "question": "考量天氣條件對於遙控無人機操控行為之影響，遙控無人機操作人應具備下列何者之基礎判讀能力？", "options": {"A": "航空氣象報文。", "B": "國內城市氣象報文。", "C": "外國城市氣象報文。", "D": "觀光地區氣象報文。"}, "answer": "A"}, {"id": 338, "chapter": 3, "chapterName": "氣象", "numberInChapter": 75, "question": "航空例行天氣報告中，所使用觀測日期與時間及其代碼說明為下列何者？", "options": {"A": "Z 字母指示碼；代表UTC 時間。", "B": "L 字母指示碼；代表本地時間。", "C": "T 字母指示碼；代表UTC 時間。", "D": "X 字母指示碼；代表本地時間。"}, "answer": "A"}, {"id": 339, "chapter": 3, "chapterName": "氣象", "numberInChapter": 76, "question": "航空例行天氣報告中，所觀測盛行能見度值，其編報方式及單位為何？", "options": {"A": "4碼（公尺）。", "B": "6碼（公尺）。", "C": "8碼（公尺）。", "D": "10碼（公尺）。"}, "answer": "A"}, {"id": 340, "chapter": 3, "chapterName": "氣象", "numberInChapter": 77, "question": "航空氣象觀測員將天空劃分成8等份，若觀測到1/8至2/8的天空被雲層遮蓋，該雲量類別稱為下列何者？", "options": {"A": "稀雲。", "B": "疏雲。", "C": "裂雲。", "D": "密雲。"}, "answer": "A"}, {"id": 341, "chapter": 3, "chapterName": "氣象", "numberInChapter": 78, "question": "航空氣象觀測員將天空劃分成8等份，若觀測到3/8至4/8的天空被雲層遮蓋，該雲量類別稱為下列何者？", "options": {"A": "稀雲。", "B": "疏雲。", "C": "裂雲。", "D": "密雲。"}, "answer": "B"}, {"id": 342, "chapter": 3, "chapterName": "氣象", "numberInChapter": 79, "question": "航空氣象觀測員將天空劃分成8等份，若觀測到5/8至7/8的天空被雲層遮蓋，該雲量類別稱為下列何者？", "options": {"A": "稀雲。", "B": "疏雲。", "C": "裂雲。", "D": "密雲。"}, "answer": "C"}, {"id": 343, "chapter": 3, "chapterName": "氣象", "numberInChapter": 80, "question": "航空氣象觀測員將天空劃分成8等份，若觀測到8/8的天空被雲層遮蓋，該雲量類別稱為下列何者？", "options": {"A": "稀雲。", "B": "疏雲。", "C": "裂雲。", "D": "密雲。"}, "answer": "D"}, {"id": 344, "chapter": 3, "chapterName": "氣象", "numberInChapter": 81, "question": "航空例行天氣報告中，雲層之雲底高度單位為下列哪一個？", "options": {"A": "公尺。", "B": "公里。", "C": "呎。", "D": "浬。"}, "answer": "C"}, {"id": 345, "chapter": 3, "chapterName": "氣象", "numberInChapter": 82, "question": "終端機場天氣觀測報中，盛行天氣現象包括下列哪個項目？", "options": {"A": "風向風速。", "B": "能見度。", "C": "天氣狀況及雲組。", "D": "以上皆是。 第四章緊急處置與飛行決策"}, "answer": "D"}, {"id": 346, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 1, "question": "遙控無人機操作人在執行任務前及過程中，需確保參與執行的成員不受下列哪種狀況的影響？", "options": {"A": "娛樂圈八卦和謠言。", "B": "國內股市行情。", "C": "酒精及藥物。", "D": "世界經濟發展情勢。"}, "answer": "C"}, {"id": 347, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 2, "question": "遙控無人機操作人在執行任務前及過程中，下列哪種狀況也可能影響操作安全？", "options": {"A": "娛樂圈八卦和謠言。", "B": "一般的成藥如抗組織胺或解除充血劑。", "C": "國內股市行情。", "D": "世界經濟發展情勢。"}, "answer": "B"}, {"id": 348, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 3, "question": "有關可能影響操作人安全操作遙控無人機的因素主要有下列哪種狀況？", "options": {"A": "過度換氣、壓力、疲勞。", "B": "脫水、熱中暑。", "C": "酒精與藥物。", "D": "以上皆是。"}, "answer": "D"}, {"id": 349, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 4, "question": "過度換氣若無法善加控制，可能讓遙控無人機操作人進入下列哪個狀態？", "options": {"A": "神經緊張。", "B": "意識不清。", "C": "心情鬱悶。", "D": "懷疑心重。"}, "answer": "B"}, {"id": 350, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 5, "question": "過度換氣的常見症狀有下列哪種狀況？", "options": {"A": "視界窄化、意識不清。", "B": "輕快或暈眩感、肢體末稍有刺痛感。", "C": "對冷熱敏感、肌肉痙攣感。", "D": "以上皆是。"}, "answer": "D"}, {"id": 351, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 6, "question": "過度換氣的改善方法是下列哪種方式？", "options": {"A": "多閱讀、多聽音樂。", "B": "適當的飲食。", "C": "血液裡的二氧化碳濃度恢復到正常狀態。", "D": "擴展社交範圍。"}, "answer": "C"}, {"id": 352, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 7, "question": "最好的預防及矯治過度換氣的方法就是下列哪種方式？", "options": {"A": "讓呼吸保持正常、朝向紙袋呼吸或大聲交談。", "B": "多閱讀、多聽音樂。", "C": "適當的飲食。", "D": "擴展社交範圍。"}, "answer": "A"}, {"id": 353, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 8, "question": "下列哪種狀況是人體對於生理及心理的需求所做出的反應？", "options": {"A": "脫水。", "B": "壓力。", "C": "熱中暑。", "D": "酒醉。"}, "answer": "B"}, {"id": 354, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 9, "question": "壓力源包括下列哪種狀況？", "options": {"A": "物理的壓力（如噪音及振動）。", "B": "生理的壓力（如疲勞）。", "C": "心理的壓力（如工作困難或個人情緒因素）。", "D": "以上皆是。"}, "answer": "D"}, {"id": 355, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 10, "question": "持續性的急性壓力可能發展成下列哪種狀況？", "options": {"A": "不定期的過度換氣壓力。", "B": "不定期的疲勞壓力。", "C": "長期的慢性壓力。", "D": "不定期的酒精壓力。"}, "answer": "C"}, {"id": 356, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 11, "question": "慢性壓力在長期累積或壓抑下，會導致下列哪種狀況？", "options": {"A": "個人能力大幅提升。", "B": "個人能力時好時壞。", "C": "個人能力大幅下滑。", "D": "個人能力保持不變。"}, "answer": "C"}, {"id": 357, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 12, "question": "遙控無人機操作人若體驗到壓力已導致己身能力下滑時即應採取下列哪種作為？", "options": {"A": "暫停執行任務、適當休息。", "B": "堅持到底、繼續執行任務。", "C": "順其自然、不必大驚小怪。", "D": "邊聽音樂舒壓、邊執行任務。"}, "answer": "A"}, {"id": 358, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 13, "question": "狀況警覺是對哪些風險元素的認知與瞭解？", "options": {"A": "飛行作業。", "B": "操作人、航空器。", "C": "環境及任務種類。", "D": "以上皆是。"}, "answer": "D"}, {"id": 359, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 14, "question": "下列哪種狀況可能使遙控無人機操作人過度集中注意力在某件事物而失去對整體任務的掌握？", "options": {"A": "疲勞。", "B": "壓力。", "C": "工作量過多。", "D": "以上皆是。"}, "answer": "D"}, {"id": 360, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 15, "question": "操作遙控無人機前藉由下列哪些有效的工作量管理，以確保飛行任務安全執行？", "options": {"A": "計畫。", "B": "整理。", "C": "排序工作任務。", "D": "以上皆是。"}, "answer": "D"}, {"id": 361, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 16, "question": "疲勞可分為下列哪幾種？", "options": {"A": "生理性疲勞。", "B": "心理性疲勞。", "C": "急性與慢性疲勞。", "D": "以上皆是。"}, "answer": "D"}, {"id": 362, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 17, "question": "疲勞會導致下列哪幾種症狀，影響遙控無人機操作人的判斷力？", "options": {"A": "注意力渙散。", "B": "專注力下降。", "C": "協調性及溝通性降低。", "D": "以上皆是。"}, "answer": "D"}, {"id": 363, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 18, "question": "急性疲勞通常是下列哪一種？", "options": {"A": "短期。", "B": "長期。", "C": "有時長期有時短期。", "D": "以上皆非。"}, "answer": "A"}, {"id": 364, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 19, "question": "遙控無人機操作人若忽略或未及時改善急性疲勞，則會進一步造成下列哪種狀況？", "options": {"A": "過度疲勞。", "B": "慢性疲勞。", "C": "中度疲勞。", "D": "低度疲勞。"}, "answer": "B"}, {"id": 365, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 20, "question": "慢性疲勞可能出現的症狀包括下列哪種狀況？", "options": {"A": "虛弱、強烈的疲倦、倦怠感。", "B": "心悸、呼吸不順、頭痛。", "C": "其他身體的不適及沮喪與焦慮。", "D": "以上皆是。"}, "answer": "D"}, {"id": 366, "chapter": 4, 人執行遙控無人機操作時，下列哪種心態干擾會降低飛行決策的品質？", "options": {"A": "反威權、衝動及僥倖。", "B": "衝動、僥倖及服從。", "C": "英雄主義及積極順應。", "D": "以上皆是。"}, "answer": "A"}, {"id": 385, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 40, "question": "遙控無人機操作人降低風險的方法，包括下列哪種？", "options": {"A": "辨識己身風險。", "B": "預知己身風險。", "C": "覺察己身風險。", "D": "以上皆是。"}, "answer": "D"}, {"id": 386, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 41, "question": "下列哪個因素與飛航安全密切相關，已成為維修部門及飛航管理部門關切的焦點？", "options": {"A": "政治因素。", "B": "人為因素。", "C": "社會因素。", "D": "經濟因素。"}, "answer": "B"}, {"id": 387, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 42, "question": "自動決策模式基本上是一種反射性的模式，其形成的重要基礎是下列哪種方式？", "options": {"A": "大量的訓練及經驗。", "B": "擴大參與人數。", "C": "正確的政治指導。", "D": "高深的哲學思想。"}, "answer": "A"}, {"id": 388, "chapter": 4, "chapterName": "緊急處置與飛行決策", "numberInChapter": 43, "question": "自動決策模式常用於下列哪種情況？", "options": {"A": "緊急情況。", "B": "無法預作分析的情況。", "C": "無法沙盤推演的情況。", "D": "以上皆是。"}, "answer": "D"}];
    const I18N = {"title": "無人機普通操作證題庫練習", "subtitle": "Anthropic 風格簡約版：清晰、低裝飾、可離線使用。題庫共 388 題。", "settings": "練習設定", "modePractice": "逐題練習", "modeMock": "50 題模擬考", "chapterRange": "章節範圍", "allChapters": "全部章節", "wrongOnly": "只出錯題", "start": "開始新回合", "submit": "交卷", "retryWrong": "立即重練錯題", "clearWrong": "清空錯題", "statTotal": "本回合題數", "statAnswered": "已作答", "statCorrect": "答對", "statAccuracy": "正確率", "statWrong": "錯題庫", "statCurrent": "目前題號", "recentScores": "最近成績", "mode": "模式", "chapter": "章節", "progress": "進度", "prev": "上一題", "next": "下一題", "clickStart": "請先點選「開始新回合」。", "noQuestion": "目前沒有可練習題目。可切換章節或關閉「只出錯題」。", "pending": "請選擇答案，系統會立即顯示正誤。", "correctMsg": "答對。正確答案：", "wrongMsg": "答錯。你選", "correctAnswer": "正確答案：", "completed": "完成", "noRecord": "尚無紀錄", "fullChapter": "全章"};
    const STORAGE_KEY = 'drone_license_practice_v3';
    const QUESTION_BY_ID = new Map(QUESTION_BANK.map(q => [q.id, q]));

    const modeButtons = document.querySelectorAll('.mode-btn');
    const chapterSelect = document.getElementById('chapterSelect');
    const wrongOnlyInput = document.getElementById('wrongOnly');
    const startBtn = document.getElementById('startBtn');
    const submitBtn = document.getElementById('submitBtn');
    const retryWrongBtn = document.getElementById('retryWrongBtn');
    const clearWrongBtn = document.getElementById('clearWrongBtn');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    const questionArea = document.getElementById('questionArea');
    const historyList = document.getElementById('historyList');
    const summaryEl = document.getElementById('summary');

    const statTotal = document.getElementById('statTotal');
    const statAnswered = document.getElementById('statAnswered');
    const statCorrect = document.getElementById('statCorrect');
    const statAccuracy = document.getElementById('statAccuracy');
    const statWrong = document.getElementById('statWrong');
    const statCurrent = document.getElementById('statCurrent');

    const chipMode = document.getElementById('chipMode');
    const chipChapter = document.getElementById('chipChapter');
    const chipProgress = document.getElementById('chipProgress');

    function applyI18n() {
      document.title = I18N.title;
      document.getElementById('title').textContent = I18N.title;
      document.getElementById('settingsTitle').textContent = I18N.settings;
      document.getElementById('btnModePractice').textContent = I18N.modePractice;
      document.getElementById('btnModeMock').textContent = I18N.modeMock;
      document.getElementById('chapterLabel').textContent = I18N.chapterRange;
      document.getElementById('wrongOnlyLabel').textContent = I18N.wrongOnly;
      startBtn.textContent = I18N.start;
      submitBtn.textContent = I18N.submit;
      retryWrongBtn.textContent = I18N.retryWrong;
      clearWrongBtn.textContent = I18N.clearWrong;
      document.getElementById('labTotal').textContent = I18N.statTotal;
      document.getElementById('labAnswered').textContent = I18N.statAnswered;
      document.getElementById('labCorrect').textContent = I18N.statCorrect;
      document.getElementById('labAccuracy').textContent = I18N.statAccuracy;
      document.getElementById('labWrong').textContent = I18N.statWrong;
      document.getElementById('labCurrent').textContent = I18N.statCurrent;
      document.getElementById('recentScores').textContent = I18N.recentScores;
      prevBtn.textContent = I18N.prev;
      nextBtn.textContent = I18N.next;
      document.getElementById('emptyText').textContent = I18N.clickStart;

      chapterSelect.innerHTML = '';
      const allOpt = document.createElement('option');
      allOpt.value = 'all';
      allOpt.textContent = I18N.allChapters;
      chapterSelect.appendChild(allOpt);

      const chapterRows = [
        [1, QUESTION_BANK.find(x => x.chapter === 1)?.chapterName || ''],
        [2, QUESTION_BANK.find(x => x.chapter === 2)?.chapterName || ''],
        [3, QUESTION_BANK.find(x => x.chapter === 3)?.chapterName || ''],
        [4, QUESTION_BANK.find(x => x.chapter === 4)?.chapterName || '']
      ];

      chapterRows.forEach(([id, name]) => {
        const o = document.createElement('option');
        o.value = String(id);
        o.textContent = `\u7b2c ${id} \u7ae0 ${name}`;
        chapterSelect.appendChild(o);
      });
    }

    function normalizeDisplayText(text) {
      if (typeof text !== 'string') return '';
      return text
        .replace(/\s+/g, ' ')
        .replace(/(?<=[\u4e00-\u9fff])\s+(?=[\u4e00-\u9fff])/g, '')
        .trim();
    }

    function defaultState() {
      return {
        mode: 'practice',
        chapter: 'all',
        wrongOnly: false,
        sessionIds: [],
        currentIndex: 0,
        answers: {},
        completed: false,
        sessionLogged: false,
        history: [],
        wrongIds: []
      };
    }

    function loadState() {
      const base = defaultState();
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return base;
        const parsed = JSON.parse(raw);
        const merged = { ...base, ...parsed };
        if (!['practice', 'mock'].includes(merged.mode)) merged.mode = 'practice';
        if (merged.chapter !== 'all' && !['1','2','3','4'].includes(String(merged.chapter))) merged.chapter = 'all';
        merged.chapter = String(merged.chapter);
        merged.wrongOnly = Boolean(merged.wrongOnly);
        merged.sessionIds = Array.isArray(merged.sessionIds) ? merged.sessionIds.filter(id => QUESTION_BY_ID.has(id)) : [];
        merged.currentIndex = Number.isInteger(merged.currentIndex) ? merged.currentIndex : 0;
        merged.answers = merged.answers && typeof merged.answers === 'object' ? merged.answers : {};
        merged.completed = Boolean(merged.completed);
        merged.sessionLogged = Boolean(merged.sessionLogged);
        merged.history = Array.isArray(merged.history) ? merged.history.slice(0, 20) : [];
        merged.wrongIds = Array.isArray(merged.wrongIds) ? Array.from(new Set(merged.wrongIds.filter(id => QUESTION_BY_ID.has(id)))) : [];
        if (merged.currentIndex >= merged.sessionIds.length) merged.currentIndex = Math.max(0, merged.sessionIds.length - 1);
        return merged;
      } catch {
        return base;
      }
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function shuffle(items) {
      const arr = [...items];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function getPool() {
      let pool = QUESTION_BANK;
      if (state.chapter !== 'all') pool = pool.filter(q => q.chapter === Number(state.chapter));
      if (state.wrongOnly) {
        const wrongSet = new Set(state.wrongIds);
        pool = pool.filter(q => wrongSet.has(q.id));
      }
      return pool;
    }

    function startNewSession() {
      const pool = getPool();
      if (!pool.length) {
        state.sessionIds = [];
        state.currentIndex = 0;
        state.answers = {};
        state.completed = false;
        state.sessionLogged = false;
        saveState();
        render();
        return;
      }
      const ids = pool.map(q => q.id);
      state.sessionIds = state.mode === 'mock' ? shuffle(ids).slice(0, Math.min(50, ids.length)) : shuffle(ids);
      state.currentIndex = 0;
      state.answers = {};
      state.completed = false;
      state.sessionLogged = false;
      saveState();
      render();
    }

    function answeredCount() {
      return Object.keys(state.answers).length;
    }

    function correctCount() {
      return state.sessionIds.reduce((sum, id) => {
        const q = QUESTION_BY_ID.get(id);
        return sum + ((q && state.answers[id] === q.answer) ? 1 : 0);
      }, 0);
    }

    function getCurrentQuestion() {
      if (!state.sessionIds.length) return null;
      return QUESTION_BY_ID.get(state.sessionIds[state.currentIndex]) || null;
    }

    function logHistory() {
      if (state.sessionLogged) return;
      const total = state.sessionIds.length;
      const answered = answeredCount();
      const correct = correctCount();
      const rate = answered ? Math.round((correct / answered) * 1000) / 10 : 0;
      state.history.unshift({
        at: new Date().toISOString(),
        mode: state.mode,
        chapter: state.chapter,
        total,
        answered,
        correct,
        rate
      });
      state.history = state.history.slice(0, 20);
      state.sessionLogged = true;
    }

    function answerCurrent(choice) {
      const q = getCurrentQuestion();
      if (!q || state.completed) return;
      if (state.answers[q.id]) return;
      state.answers[q.id] = choice;

      const wrongSet = new Set(state.wrongIds);
      if (choice === q.answer) wrongSet.delete(q.id);
      else wrongSet.add(q.id);
      state.wrongIds = [...wrongSet].sort((a, b) => a - b);

      if (answeredCount() === state.sessionIds.length && state.sessionIds.length > 0) {
        state.completed = true;
        logHistory();
      }

      saveState();
      render();
    }

    function submitSession() {
      if (!state.sessionIds.length) return;
      state.completed = true;
      logHistory();
      saveState();
      render();
    }

    function go(delta) {
      if (!state.sessionIds.length) return;
      const next = state.currentIndex + delta;
      if (next < 0 || next >= state.sessionIds.length) return;
      state.currentIndex = next;
      saveState();
      render();
    }

    function formatDate(iso) {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '-';
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, '0');
      const day = String(d.getDate()).padStart(2, '0');
      const hh = String(d.getHours()).padStart(2, '0');
      const mm = String(d.getMinutes()).padStart(2, '0');
      return `${y}-${m}-${day} ${hh}:${mm}`;
    }

    function renderHistory() {
      historyList.innerHTML = '';
      if (!state.history.length) {
        const li = document.createElement('li');
        li.textContent = I18N.noRecord;
        historyList.appendChild(li);
        return;
      }
      state.history.forEach(item => {
        const li = document.createElement('li');
        const modeText = item.mode === 'mock' ? I18N.modeMock : I18N.modePractice;
        const chapterText = item.chapter === 'all' ? I18N.fullChapter : `\u7b2c${item.chapter}\u7ae0`;
        li.textContent = `${formatDate(item.at)} | ${modeText} | ${chapterText} | ${item.correct}/${item.total} (${I18N.statAnswered}${item.answered}, ${item.rate}%)`;
        historyList.appendChild(li);
      });
    }

    function renderStats() {
      const total = state.sessionIds.length;
      const answered = answeredCount();
      const correct = correctCount();
      const accuracy = answered ? (correct / answered * 100).toFixed(1) : '0.0';

      statTotal.textContent = String(total);
      statAnswered.textContent = String(answered);
      statCorrect.textContent = String(correct);
      statAccuracy.textContent = `${accuracy}%`;
      statWrong.textContent = String(state.wrongIds.length);
      statCurrent.textContent = total ? `${state.currentIndex + 1} / ${total}` : '-';

      chipMode.textContent = `${I18N.mode}: ${state.mode === 'mock' ? I18N.modeMock : I18N.modePractice}`;
      chipChapter.textContent = `${I18N.chapter}: ${state.chapter === 'all' ? I18N.allChapters : `\u7b2c${state.chapter}\u7ae0`}`;
      chipProgress.textContent = `${I18N.progress}: ${answered} / ${total}`;

      submitBtn.style.display = state.mode === 'mock' ? 'inline-block' : 'none';
    }

    function renderQuestion() {
      const q = getCurrentQuestion();
      if (!q) {
        questionArea.innerHTML = `<div class="empty">${I18N.noQuestion}</div>`;
        return;
      }

      const selected = state.answers[q.id] || null;
      const showCorrect = Boolean(selected || state.completed);
      const answered = Boolean(selected);

      const box = document.createElement('div');

      const stem = document.createElement('p');
      stem.className = 'stem';
      stem.textContent = normalizeDisplayText(q.question);
      box.appendChild(stem);

      const list = document.createElement('div');
      list.className = 'option-list';

      ['A','B','C','D'].forEach(code => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'option';
        btn.disabled = answered || state.completed;

        const isSelected = selected === code;
        const isCorrect = q.answer === code;

        if (isSelected) btn.classList.add('selected');
        if (showCorrect && isCorrect) btn.classList.add('correct');
        if (showCorrect && isSelected && !isCorrect) btn.classList.add('wrong');

        btn.innerHTML = `<span class="code">${code}.</span><span>${normalizeDisplayText(q.options[code])}</span>`;
        btn.addEventListener('click', () => answerCurrent(code));
        list.appendChild(btn);
      });

      box.appendChild(list);

      const feedback = document.createElement('div');
      feedback.className = 'feedback';

      if (!selected && !state.completed) {
        feedback.classList.add('pending');
        feedback.textContent = I18N.pending;
      } else if (selected === q.answer) {
        feedback.classList.add('ok');
        feedback.textContent = `${I18N.correctMsg} ${q.answer}`;
      } else if (selected && selected !== q.answer) {
        feedback.classList.add('bad');
        feedback.textContent = `${I18N.correctAnswer} ${q.answer}`;
      } else {
        feedback.classList.add('pending');
        feedback.textContent = `${I18N.correctAnswer} ${q.answer}`;
      }

      box.appendChild(feedback);
      questionArea.innerHTML = '';
      questionArea.appendChild(box);
    }

    function renderSummary() {
      const total = state.sessionIds.length;
      if (!state.completed || !total) {
        summaryEl.classList.remove('show');
        summaryEl.textContent = '';
        return;
      }
      const correct = correctCount();
      const rate = ((correct / total) * 100).toFixed(1);
      const modeText = state.mode === 'mock' ? I18N.modeMock : I18N.modePractice;
      summaryEl.classList.add('show');
      summaryEl.innerHTML = `<strong>${modeText}${I18N.completed}</strong><br>${I18N.statCorrect} ${correct} / ${total}，${I18N.statAccuracy} ${rate}%`;
    }

    function renderControls() {
      modeButtons.forEach(btn => btn.classList.toggle('active', btn.dataset.mode === state.mode));
      chapterSelect.value = state.chapter;
      wrongOnlyInput.checked = state.wrongOnly;
      prevBtn.disabled = !state.sessionIds.length || state.currentIndex === 0;
      nextBtn.disabled = !state.sessionIds.length || state.currentIndex >= state.sessionIds.length - 1;
      retryWrongBtn.disabled = state.wrongIds.length === 0;
    }

    function render() {
      renderControls();
      renderStats();
      renderQuestion();
      renderSummary();
      renderHistory();
    }

    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        state.mode = btn.dataset.mode;
        saveState();
        render();
      });
    });

    chapterSelect.addEventListener('change', () => {
      state.chapter = chapterSelect.value;
      saveState();
      render();
    });

    wrongOnlyInput.addEventListener('change', () => {
      state.wrongOnly = wrongOnlyInput.checked;
      saveState();
      render();
    });

    startBtn.addEventListener('click', startNewSession);
    submitBtn.addEventListener('click', submitSession);
    prevBtn.addEventListener('click', () => go(-1));
    nextBtn.addEventListener('click', () => go(1));

    retryWrongBtn.addEventListener('click', () => {
      if (!state.wrongIds.length) return;
      state.wrongOnly = true;
      saveState();
      startNewSession();
    });

    clearWrongBtn.addEventListener('click', () => {
      state.wrongIds = [];
      state.wrongOnly = false;
      saveState();
      render();
    });

    function handleGlobalKeydown(event) {
      const active = document.activeElement;
      if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.tagName === 'SELECT')) {
        return;
      }

      const key = event.key;

      if (key === 'ArrowLeft' || key === 'ArrowUp') {
        event.preventDefault();
        go(-1);
        return;
      }

      if (key === 'ArrowRight' || key === 'ArrowDown') {
        event.preventDefault();
        go(1);
        return;
      }

      const map = { '1': 'A', '2': 'B', '3': 'C', '4': 'D' };
      const choice = map[key];
      if (choice) {
        event.preventDefault();
        answerCurrent(choice);
      }
    }

    document.addEventListener('keydown', handleGlobalKeydown);

    applyI18n();
    let state = loadState();
    if (!state.sessionIds.length) startNewSession();
    else render();
  </script>
