<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <style>
    :root {
      --bg: #f6f4ef;
      --surface: #ffffff;
      --surface-soft: #fbfaf8;
      --text: #202124;
      --text-muted: #666a70;
      --border: #dfd8ca;
      --accent: #b86b3d;
      --accent-soft: #f4ece6;
      --success: #16603f;
      --success-soft: #e9f4ef;
      --danger: #9f2f2f;
      --danger-soft: #faeceb;
      --radius: 12px;
      --focus: 0 0 0 2px rgba(184, 107, 61, 0.22);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", "Heiti TC", sans-serif;
      line-height: 1.55;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 14px 28px;
    }

    .hero {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0;
      font-family: "Noto Serif TC", "PMingLiU", serif;
      font-size: clamp(1.3rem, 1rem + 1vw, 1.9rem);
      font-weight: 600;
      letter-spacing: 0.01em;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .grid {
      display: grid;
      grid-template-columns: 320px 1fr;
      gap: 14px;
    }

    .panel, .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
    }

    .panel h2 {
      margin: 0 0 10px;
      font-size: 1.02rem;
      font-weight: 600;
    }

    .row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    button, select { font: inherit; }

    .btn, .mode-btn, .nav-btn {
      border: 1px solid var(--border);
      background: var(--surface-soft);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease;
    }

    .mode-btn.active {
      border-color: var(--accent);
      background: var(--accent-soft);
      color: #7d4524;
      font-weight: 600;
    }

    .btn.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
      font-weight: 600;
    }

    .btn:hover, .mode-btn:hover, .nav-btn:hover { background: #f3eee7; }
    .btn.primary:hover { background: #a95f33; }

    .btn:focus-visible, .mode-btn:focus-visible, .nav-btn:focus-visible, .option:focus-visible, select:focus-visible {
      outline: none;
      box-shadow: var(--focus);
    }

    .btn:disabled, .nav-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    label {
      display: block;
      margin: 8px 0 5px;
      font-size: 0.92rem;
      color: var(--text-muted);
    }

    select {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface);
      color: var(--text);
      padding: 8px 10px;
    }

    .checkline {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0 12px;
      font-size: 0.92rem;
    }

    .checkline input { accent-color: var(--accent); }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .stat {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: var(--surface-soft);
    }

    .label {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-bottom: 2px;
    }

    .value {
      font-weight: 600;
      font-size: 1rem;
    }

    .history {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1px solid var(--border);
    }

    .history strong { font-size: 0.92rem; }

    .history ul {
      margin: 6px 0 0;
      padding-left: 18px;
      max-height: 180px;
      overflow: auto;
      color: var(--text-muted);
      font-size: 0.88rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 10px;
    }

    .chip {
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--surface-soft);
      color: var(--text-muted);
      padding: 3px 10px;
      font-size: 0.82rem;
    }

    .stem {
      margin: 0 0 12px;
      font-size: 1.06rem;
      white-space: pre-wrap;
    }

    .option-list {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .option {
      border: 1px solid var(--border);
      background: var(--surface);
      border-radius: 10px;
      width: 100%;
      padding: 9px 10px;
      text-align: left;
      display: flex;
      gap: 8px;
      cursor: pointer;
      color: var(--text);
      min-height: 48px;
    }

    .option .code {
      font-weight: 700;
      color: #5b5f66;
      min-width: 20px;
    }

    .option.selected { background: #f3efe8; border-color: #c6b8a2; }
    .option.correct { background: var(--success-soft); border-color: #b7dac8; }
    .option.wrong { background: var(--danger-soft); border-color: #efc1be; }

    .feedback {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-soft);
      padding: 9px 10px;
      font-size: 0.93rem;
      min-height: 42px;
      margin-top: 2px;
    }

    .feedback.ok { border-color: #b7dac8; background: var(--success-soft); color: var(--success); }
    .feedback.bad { border-color: #efc1be; background: var(--danger-soft); color: var(--danger); }
    .feedback.pending { color: var(--text-muted); }

    .nav {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
      gap: 8px;
    }

    .summary {
      margin-top: 10px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--surface-soft);
      padding: 10px;
      display: none;
      font-size: 0.93rem;
    }

    .summary.show { display: block; }

    .empty {
      color: var(--text-muted);
      text-align: center;
      padding: 22px 0;
      font-size: 0.95rem;
    }

    @media (max-width: 920px) { .grid { grid-template-columns: 1fr; } }

    @media (max-width: 520px) {
      .wrap { padding: 12px 10px 20px; }
      .panel, .card, .hero { padding: 12px; }
      .stats { grid-template-columns: 1fr 1fr; }
      .stem { font-size: 1rem; }
      .btn, .mode-btn, .nav-btn { padding: 8px 10px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1 id="title"></h1>
    </section>

    <main class="grid">
      <aside class="panel">
        <h2 id="settingsTitle"></h2>

        <div class="row" id="modeButtons">
          <button class="mode-btn" data-mode="practice" id="btnModePractice"></button>
          <button class="mode-btn" data-mode="mock" id="btnModeMock"></button>
        </div>

        <label for="chapterSelect" id="chapterLabel"></label>
        <select id="chapterSelect"></select>

        <label class="checkline">
          <input id="wrongOnly" type="checkbox" />
          <span id="wrongOnlyLabel"></span>
        </label>

        <div class="row">
          <button id="startBtn" class="btn primary"></button>
          <button id="submitBtn" class="btn"></button>
        </div>

        <div class="row">
          <button id="retryWrongBtn" class="btn"></button>
          <button id="clearWrongBtn" class="btn"></button>
        </div>

        <section class="stats" aria-label="stats">
          <div class="stat"><div class="label" id="labTotal"></div><div class="value" id="statTotal">0</div></div>
          <div class="stat"><div class="label" id="labAnswered"></div><div class="value" id="statAnswered">0</div></div>
          <div class="stat"><div class="label" id="labCorrect"></div><div class="value" id="statCorrect">0</div></div>
          <div class="stat"><div class="label" id="labAccuracy"></div><div class="value" id="statAccuracy">0%</div></div>
          <div class="stat"><div class="label" id="labWrong"></div><div class="value" id="statWrong">0</div></div>
          <div class="stat"><div class="label" id="labCurrent"></div><div class="value" id="statCurrent">-</div></div>
        </section>

        <section class="history">
          <strong id="recentScores"></strong>
          <ul id="historyList"></ul>
        </section>
      </aside>

      <section class="card">
        <div class="chips">
          <span class="chip" id="chipMode"></span>
          <span class="chip" id="chipChapter"></span>
          <span class="chip" id="chipProgress"></span>
        </div>

        <div id="questionArea"><div class="empty" id="emptyText"></div></div>

        <div class="nav">
          <button id="prevBtn" class="nav-btn"></button>
          <button id="nextBtn" class="nav-btn"></button>
        </div>

        <div id="summary" class="summary"></div>
      </section>
    </main>
  </div>

  <script>
    const QUESTION_BANK = [{"id": 1, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 1, "question": "遙控無人機如為不法份子作為犯罪工具或因不當操作而致失控墜落者，可能導致何種後果？", "options": {"A": "造成他人生命財產之損失。", "B": "危害公共利益。", "C": "影響飛航安全。", "D": "以上皆是。"}, "answer": "D"}, {"id": 2, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 2, "question": "市面上遙控無人機類型繁多，為保障操作安全，操作人於購買時應留意產品何項資訊？", "options": {"A": "使用限制。", "B": "操作性能。", "C": "保固範圍。", "D": "以上皆是。"}, "answer": "D"}, {"id": 3, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 3, "question": "遙控無人機之註冊、針對操作人員進行教育宣導及操作範圍警示之規定，係為達到哪個目的？", "options": {"A": "刁難操作人員。", "B": "打擊遙控無人機市場。", "C": "安全使用。", "D": "以上皆是。"}, "answer": "C"}, {"id": 4, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 4, "question": "操作證考取目的係為確保操作人於哪個階段能熟悉相關航空知識與管理規範，並具備一定操作熟練度及緊急處置能力？", "options": {"A": "操作前及操作時。", "B": "操作前及操作後。", "C": "操作前。", "D": "操作後。"}, "answer": "A"}, {"id": 5, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 5, "question": "外國人領有外國政府對於所持有遙控無人機之註冊、操作證及檢驗合格等證明文件者， 必須向哪個單位申請認可後，於遵守我國相關法令下從事遙控無人機活動？", "options": {"A": "外交部。", "B": "駐外單位。", "C": "民航局。", "D": "科技部。"}, "answer": "C"}, {"id": 6, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 6, "question": "操作人僅透過遙控無人機即時傳輸圖像功能，是否即足以監控鏡頭外之周遭狀況？", "options": {"A": "否。", "B": "是。", "C": "視傳輸圖像清晰度而定。", "D": "視天氣狀況而定。"}, "answer": "A"}, {"id": 7, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 7, "question": "操作人不得利用遙控無人機從事哪種行為？", "options": {"A": "合法行為。", "B": "非法行為。", "C": "適法行為。", "D": "法定行為。"}, "answer": "B"}, {"id": 8, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 8, "question": "操作人不得無故利用遙控無人機對他人進行何種行為？", "options": {"A": "攝錄非公開活動。", "B": "竊聽私下談話。", "C": "窺視身體隱私部位。", "D": "以上皆是。"}, "answer": "D"}, {"id": 9, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 9, "question": "操作人未經同意，不得以遙控無人機對他人進行何種行為？", "options": {"A": "錄音。", "B": "照相、錄影。", "C": "電磁紀錄竊錄。", "D": "以上皆是。"}, "answer": "D"}, {"id": 10, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 10, "question": "操作人不得無故利用遙控無人機於哪個場所進行飛航活動？", "options": {"A": "私人庭院。", "B": "學校教室。", "C": "辦公室場所。", "D": "以上皆是。"}, "answer": "D"}, {"id": 11, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 11, "question": "遙控無人機於空中進行飛航活動時，易伴隨較高之何種風險？", "options": {"A": "文化風險。", "B": "健康風險。", "C": "社會風險。", "D": "貿易風險。"}, "answer": "C"}, {"id": 12, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 12, "question": "對違反規範之遙控無人機操作人及所有人所為之處罰，係欲達到哪個目的？", "options": {"A": "維持社會秩序。", "B": "增進公共利益。", "C": "維護公共安全。", "D": "以上皆是。"}, "answer": "D"}, {"id": 13, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 13, "question": "針對違反規範之遙控無人機操作人及所有人所處以罰鍰額度，係衡量何種因素而定？", "options": {"A": "公眾利益及安全財產危害程度。", "B": "政府稅收及國家經濟指數。", "C": "國力強弱及世界局勢。", "D": "教育程度及人民素質等。"}, "answer": "A"}, {"id": 14, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 14, "question": "操作人於遵守相關規範下從事屬休閒娛樂性質之遙控無人機活動，其活動風險以何種管理方式為主？", "options": {"A": "財政管理。", "B": "自我管理。", "C": "衛生管理。", "D": "健康管理。"}, "answer": "B"}, {"id": 15, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 15, "question": "為法人從事業務之遙控無人機操作人，依法須強制加入何種保險？", "options": {"A": "積水險。", "B": "責任險。", "C": "地震險。", "D": "颱風險。"}, "answer": "B"}, {"id": 16, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 16, "question": "遙控無人機定義為何？", "options": {"A": "自遙控設備以信號鏈路進行飛航控制之無人航空器。", "B": "自遙控設備以自動駕駛操作之無人航空器。", "C": "其他經民航局公告之無人航空器。", "D": "以上皆是。"}, "answer": "D"}, {"id": 17, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 17, "question": "某遙控無人機操作人欲代地方農會執行農藥噴灑作業，以下敘述何者正確？", "options": {"A": "該操作人須通過學、術科測驗。", "B": "該操作人不須通過術科測驗。", "C": "執行農藥噴灑作業前不需經申請核准。", "D": "以上皆是。"}, "answer": "A"}, {"id": 18, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 18, "question": "於何處進行遙控無人機飛航活動適用民用航空法之「遙控無人機」相關規定？", "options": {"A": "建築物內密閉空間。", "B": "建築物外開放空間。", "C": "任何空間。", "D": "以上皆非。"}, "answer": "B"}, {"id": 19, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 19, "question": "遙控無人機活動期間，其所有人或操作人應負責任為何？", "options": {"A": "使用安全之責。", "B": "風險管理之責。", "C": "法規遵循之責。", "D": "以上皆是。"}, "answer": "D"}, {"id": 20, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 20, "question": "有關遙控無人機飛航活動，下列敘述何者正確？", "options": {"A": "未經許可不得飛航於禁航區。", "B": "可任意飛航於限航區。", "C": "航空站四周之一定距離範圍內飛航無相關規定。", "D": "以上皆是。"}, "answer": "A"}, {"id": 21, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 21, "question": "航空站或飛行場四周之一定距離範圍係由哪個機關進行公告？", "options": {"A": "民航局。", "B": "衛福部。", "C": "內政部。", "D": "文化部。"}, "answer": "A"}, {"id": 22, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 22, "question": "直轄市、縣（市）政府依民航法第99條之13第2項所規範之區域內，得依公益及安全需要，進行哪些項目之公告？", "options": {"A": "遙控無人機活動區域。", "B": "遙控無人機活動時間。", "C": "其他管理事項。", "D": "以上皆是。"}, "answer": "D"}, {"id": 23, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 23, "question": "中央主管機關認有禁止或限制遙控無人機飛航活動需求者，得提請所在地哪個機關進行公告？", "options": {"A": "鄉鎮區公所。", "B": "直轄市、縣（市）政府。", "C": "地方派出所。", "D": "地方農會。"}, "answer": "B"}, {"id": 24, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 24, "question": "政府機關（構）、學校或法人因執行業務需於禁、限航區及航空站或飛行場四周一定距離範圍內從事遙控無人機飛航活動者，應申請何者會商目的事業主管機關同意後，始得為之？", "options": {"A": "鄉鎮區公所。", "B": "衛福部。", "C": "民航局。", "D": "科技部。"}, "answer": "C"}, {"id": 25, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 25, "question": "政府機關（構）、學校或法人因執行業務需於直轄市、縣（市）政府所公告之遙控無人機活動區域、時間及其他管理事項外從事飛航活動者，應申請何者會商相關中央主管機關同意後，始得為之？", "options": {"A": "直轄市、縣（市）政府。", "B": "衛福部。", "C": "農委會。", "D": "交通部。"}, "answer": "A"}, {"id": 26, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 26, "question": "遙控無人機未經同意飛入禁航區、限航區，得由何者採取適當措施予以制止或排除？", "options": {"A": "交通警察大隊。", "B": "禁航區、限航區之管理人。", "C": "鄉鎮區公所。", "D": "地方派出所。"}, "answer": "B"}, {"id": 27, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 27, "question": "遙控無人機未經同意飛入航空站或飛行場四周之一定距離範圍內者，航空站、飛行場之經營人或管理人得會同何者予以取締？", "options": {"A": "當地里長。", "B": "地方派出所。", "C": "航空警察局。", "D": "交通警察大隊。"}, "answer": "C"}, {"id": 28, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 28, "question": "遙控無人機未經同意飛入直轄市、縣（市）政府所公告之活動區域、時間及其他管理事項外者，得由何者進行取締？", "options": {"A": "直轄市、縣（市）政府。", "B": "鄉鎮區公所。", "C": "地方派出所。", "D": "衛福部。"}, "answer": "A"}, {"id": 29, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 29, "question": "從事休閒娛樂用途之遙控無人機活動，其飛航實際高度不得逾距地面或水面多少高度？", "options": {"A": "800呎。", "B": "400呎。", "C": "200呎。", "D": "100呎。"}, "answer": "B"}, {"id": 30, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 30, "question": "從事遙控無人機飛航活動，非經民航局核准不得執行下列何者行為？", "options": {"A": "以信號鏈路進行飛航控制。", "B": "以自動駕駛操作。", "C": "投擲或噴灑任何物件。", "D": "其他經民航局同意之操作。"}, "answer": "C"}, {"id": 31, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 31, "question": "從事遙控無人機飛航活動，不得裝載哪種物品？", "options": {"A": "光學酬載。", "B": "飛航所需燃油或電池。", "C": "民用航空法所公告之危險物品。", "D": "調整重心所需之配重塊。"}, "answer": "C"}, {"id": 32, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 32, "question": "哪個機關負責訂定從事遙控無人機飛航活動所應遵守之規範？", "options": {"A": "衛福部。", "B": "交通部。", "C": "內政部。", "D": "文化部。"}, "answer": "B"}, {"id": 33, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 33, "question": "從事休閒娛樂用途之遙控無人機不得於下列哪個區域進行飛航活動？", "options": {"A": "人群聚集或室外集會遊行上空。", "B": "經地方政府同意開放無人機活動之公園綠地。", "C": "經地方政府同意開放無人機活動之人煙稀少區。", "D": "經地方政府同意開放無人機活動之河灘地。"}, "answer": "A"}, {"id": 34, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 34, "question": "從事休閒娛樂用途之遙控無人機不得於下列哪個時間進行飛航活動？", "options": {"A": "日落後至日出前。", "B": "日出後。", "C": "正中午。", "D": "無特別規定。"}, "answer": "A"}, {"id": 35, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 35, "question": "操作人於從事休閒娛樂用途之遙控無人機飛航活動時，最多得同時控制幾架遙控無人機？", "options": {"A": "1架。", "B": "2架。", "C": "5架。", "D": "10架以上。"}, "answer": "A"}, {"id": 36, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 36, "question": "操作人於從事遙控無人機飛航活動期間，應留意下列何者？", "options": {"A": "遙控無人機之販售包裝。", "B": "遙控無人機之外觀造型。", "C": "遙控無人機飛航及其周遭狀況。", "D": "以上皆非。"}, "answer": "C"}, {"id": 37, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 37, "question": "從事遙控無人機飛航活動時，應防止其與何者之接近或碰撞？", "options": {"A": "其他航空器。", "B": "建築物。", "C": "人群。", "D": "以上皆是。"}, "answer": "D"}, {"id": 38, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 38, "question": "政府機關（構）、學校或法人欲執行遙控無人機法規所訂之操作限制者，得檢附相關文書並向下列何者申請核准後為之？", "options": {"A": "直轄市、縣（市）政府。", "B": "民航局。", "C": "警察機關。", "D": "衛福部。"}, "answer": "B"}, {"id": 39, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 39, "question": "政府機關（構）、學校或法人經民航局核准得於「人群聚集或室外集會遊行上空」進行飛航活動者，其活動場地部分仍應取得何者之同意？", "options": {"A": "直轄市、縣（市）政府及相關中央主管機關。", "B": "直轄市、縣（市）政府。", "C": "相關中央主管機關。", "D": "當地派出所。"}, "answer": "A"}, {"id": 40, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 40, "question": "操作遙控無人機發生下列哪種情形時，遙控無人機所有人應負賠償責任？", "options": {"A": "故意致他人死傷。", "B": "過失致他人死傷。", "C": "故意或過失毀損他人財物。", "D": "以上皆是。"}, "answer": "D"}, {"id": 41, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 41, "question": "遙控無人機所有人將其遙控無人機交由他人進行操作而不慎墜落傷人，應由何人負連帶賠償責任？", "options": {"A": "所有人及旁觀人。", "B": "所有人及設計者。", "C": "所有人及操作人。", "D": "所有人及製造者。"}, "answer": "C"}, {"id": 42, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 42, "question": "政府機關（構）、學校或法人於從事民航局核准之遙控無人機飛航活動前，應依法投保責任保險，係依據何法所定之內容？", "options": {"A": "保險法。", "B": "民用航空法。", "C": "民法。", "D": "勞動基準法。"}, "answer": "B"}, {"id": 43, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 43, "question": "遙控無人機所有人或操作人違反「禁航區、限航區及航空站或飛行場四周之一定距離範圍內從事飛航活動」之相關規定者，民航局除廢止其操作證並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "options": {"A": "3萬元以上18萬元以下。", "B": "5萬元以上28萬元以下。", "C": "10萬元以上48萬元以下。", "D": "30萬元以上150萬元以下。"}, "answer": "D"}, {"id": 44, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 44, "question": "遙控無人機所有人或操作人違反「不得逾距地面或水面高度400呎從事飛航活動」之規定者，民航局除廢止其操作證並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "options": {"A": "30萬元以上150萬元以下。", "B": "1萬元以上10萬元以下。", "C": "20萬元以上50萬元以下。", "D": "5萬元以上30萬元以下。"}, "answer": "A"}, {"id": 45, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 45, "question": "遙控無人機之所有人或操作人違反「未領有操作證而操作遙控無人機」之規定者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "options": {"A": "1萬元以上8萬元以下。", "B": "3萬元以上18萬元以下。", "C": "6萬元以上30萬元以下。", "D": "8萬元以上38萬元以下。"}, "answer": "C"}, {"id": 46, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 46, "question": "遙控無人機之所有人或操作人違反「未投保或未足額投保責任保險而從事遙控無人機活動」之規定者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "options": {"A": "6萬元以上30萬元以下。", "B": "3萬元以上20萬元以下。", "C": "1萬元以上8萬元以下。", "D": "8萬元以上50萬元以下。"}, "answer": "A"}, {"id": 47, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 47, "question": "遙控無人機之所有人或操作人違反「遙控無人機註冊或標明註冊號碼」之相關規定者， 除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "options": {"A": "10萬元以上48萬元以下。", "B": "8萬元以上38萬元以下。", "C": "5萬元以上28萬元以下。", "D": "3萬元以上15萬元以下。"}, "answer": "D"}, {"id": 48, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 48, "question": "遙控無人機之所有人或操作人違反「直轄市、縣（市）政府公告之區域、時間及其他管理事項」之相關規定者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "options": {"A": "3萬元以上15萬元以下。", "B": "5萬元以上28萬元以下。", "C": "8萬元以上38萬元以下。", "D": "15萬元以上30萬元以下。"}, "answer": "A"}, {"id": 49, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 49, "question": "遙控無人機之所有人或操作人違反「遙控無人機飛航活動應遵守之規定」者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "options": {"A": "10萬元以上48萬元以下。", "B": "8萬元以上38萬元以下。", "C": "5萬元以上28萬元以下。", "D": "3萬元以上15萬元以下。"}, "answer": "D"}, {"id": 50, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 50, "question": "違反「射頻識別、檢驗、認可、維修與檢查、飛航活動之活動許可及內容、製造者與進口者之登錄及責任、飛航安全相關事件之通報等事項」規定者，除禁止其活動，情節重大者並得沒入遙控無人機外，另處多少新臺幣之罰鍰？", "options": {"A": "1萬元以上150萬元以下。", "B": "5萬元以上498萬元以下。", "C": "8萬元以上798萬元以下。", "D": "10萬元以上998萬元以下。"}, "answer": "A"}, {"id": 51, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 51, "question": "遙控無人機和遙控設備間為操作飛行管理目的之資料鏈接，稱之？", "options": {"A": "網路鏈路。", "B": "通訊及控制信號鏈路。", "C": "電信鏈路。", "D": "光纖鏈路。"}, "answer": "B"}, {"id": 52, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 52, "question": "計算遙控無人機之最大起飛重量(MTOW)，應包含下列哪些重量？", "options": {"A": "機體。", "B": "燃料、電池。", "C": "負載設備、酬載。", "D": "以上皆是。"}, "answer": "D"}, {"id": 53, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 53, "question": "依據法規定義，於遙控無人機飛航活動期間，實際操控遙控無人機或指揮監督飛航活動之人員稱之？", "options": {"A": "目視觀察員。", "B": "遙控無人機操作人。", "C": "任務協調員。", "D": "以上皆非。"}, "answer": "B"}, {"id": 54, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 54, "question": "依據法規定義，持有遙控無人機操作證並於遙控無人機活動期間，提供實際操控遙控無人機操作人必要飛航資訊之人員稱之？", "options": {"A": "設計者。", "B": "目視觀察員。", "C": "製造者。", "D": "遙控無人機所有人。"}, "answer": "B"}, {"id": 55, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 55, "question": "遙控無人機依其構造可分為哪幾種？", "options": {"A": "無人飛機。", "B": "無人直昇機。", "C": "無人多旋翼機。", "D": "以上皆是。"}, "answer": "D"}, {"id": 56, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 56, "question": "無人多旋翼機具有幾個以上之垂直傳動軸？", "options": {"A": "2個以上。", "B": "3個以上。", "C": "4個以上。", "D": "6個以上。"}, "answer": "B"}, {"id": 57, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 57, "question": "何人應負飛航安全之責，對遙控無人機為妥善之維護，並從事安全飛航作業？", "options": {"A": "遙控無人機所有人及操作人。", "B": "遙控無人機設計者。", "C": "遙控無人機製造者。", "D": "遙控無人機改裝者。"}, "answer": "A"}, {"id": 58, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 58, "question": "若遙控無人機飛航活動涉及2位以上之操作者，下列敘述何者正確？", "options": {"A": "應指定1人為決定權人，使得從事飛航活動。", "B": "不須指定決定權人即可從事飛航活動。", "C": "是否指定決定權人視任務性質而定。", "D": "以上皆非。"}, "answer": "A"}, {"id": 59, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 59, "question": "下列何者較適合做為遙控無人機註冊號碼之標明處所？", "options": {"A": "起落架上。", "B": "螺旋槳面上。", "C": "機身未遮蔽之平整面上。", "D": "電池蓋上。"}, "answer": "C"}, {"id": 60, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 60, "question": "註冊號碼應以標籤、鐫刻、噴漆或其他能辨識之方式標明，並於每次飛航時符合下列何項要求？", "options": {"A": "確保不至脫落。", "B": "保持清潔。", "C": "能明顯辨識。", "D": "以上皆是。"}, "answer": "D"}, {"id": 61, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 61, "question": "遙控無人機註冊號碼之標漆位置依法應位於何處？", "options": {"A": "固定結構內部。", "B": "固定結構外部。", "C": "轉動機構外部。", "D": "轉動機構內部。"}, "answer": "B"}, {"id": 62, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 62, "question": "註冊號碼之顏色應以肉眼即能辨識，並應符合下列何項要求？", "options": {"A": "融入背景顏色。", "B": "與背景顏色相近。", "C": "與背景明顯反襯。", "D": "無特別規定。"}, "answer": "C"}, {"id": 63, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 63, "question": "有關遙控無人機註冊號碼之使用，下列何者正確？", "options": {"A": "不得偽造。", "B": "不得變造。", "C": "不得矇領。", "D": "以上皆是。"}, "answer": "D"}, {"id": 64, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 64, "question": "有關遙控無人機註冊號碼之使用，下列何者正確？", "options": {"A": "不得於任何未註冊之遙控無人機上使用。", "B": "可於他人未註冊之遙控無人機上使用。", "C": "可於自己所有未註冊之遙控無人機上使用。", "D": "使用狀況視遙控無人機型式而定。"}, "answer": "A"}, {"id": 65, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 65, "question": "最大起飛重量超過一定重量之遙控無人機應具有射頻識別功能，其一定重量，係由下列哪個機關公告之？", "options": {"A": "衛福部。", "B": "內政部。", "C": "科技部。", "D": "民航局。"}, "answer": "D"}, {"id": 66, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 66, "question": "遙控無人機之設計、製造、改裝，可由何者提出型式檢驗申請？", "options": {"A": "設計者。", "B": "製造者。", "C": "改裝者。", "D": "以上皆可。"}, "answer": "D"}, {"id": 67, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 67, "question": "遙控無人機之設計、製造、改裝，應檢附申請書向哪個機關申請型式檢驗？", "options": {"A": "民航局。", "B": "衛福部。", "C": "內政部。", "D": "科技部。"}, "answer": "A"}, {"id": 68, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 68, "question": "自國外進口之遙控無人機，應由何者依規定向民航局申請型式檢驗？", "options": {"A": "操作人。", "B": "所有人。", "C": "進口者。", "D": "設計者。"}, "answer": "C"}, {"id": 69, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 69, "question": "遙控無人機於設計、製造、改裝階段為驗證性能諸元所需之試飛，應檢附文件向哪個機關申請試飛活動？", "options": {"A": "衛福部。", "B": "內政部。", "C": "科技部。", "D": "民航局。"}, "answer": "D"}, {"id": 70, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 70, "question": "最大起飛重量25公斤以上之遙控無人機，為確保其符合設計、製造、改裝之性能諸元， 應由何者提出實體檢驗申請？", "options": {"A": "操作人。", "B": "所有人。", "C": "設計者。", "D": "製造者。"}, "answer": "B"}, {"id": 71, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 71, "question": "最大起飛重量25公斤以上之遙控無人機，為確保其符合設計、製造、改裝之性能諸元， 應向哪個機關申請實體檢驗？", "options": {"A": "民航局。", "B": "衛福部。", "C": "內政部。", "D": "科技部。"}, "answer": "A"}, {"id": 72, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 72, "question": "自行製造、使用之最大起飛重量25公斤以上遙控無人機，何人可提出合併型式檢驗及實體檢驗之申請？", "options": {"A": "製造者。", "B": "操作人。", "C": "所有人。", "D": "設計者。"}, "answer": "C"}, {"id": 73, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 73, "question": "自行製造、使用之最大起飛重量25公斤以上遙控無人機，可向哪個機關提出合併型式檢驗及實體檢驗之申請？", "options": {"A": "內政部。", "B": "民航局。", "C": "科技部。", "D": "衛福部。"}, "answer": "B"}, {"id": 74, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 74, "question": "實體檢驗合格證或特種實體檢驗合格證之記載事項如有變更時，下列敘述何者正確？", "options": {"A": "製造者應於事實發生日起15日內申請換發。", "B": "設計者應於事實發生日起10日內申請換發。", "C": "操作人應於事實發生日起7日內申請換發。", "D": "所有人應於事實發生日起15日內申請換發。"}, "answer": "D"}, {"id": 75, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 75, "question": "有關遙控無人機製造者與進口者申請產品資訊登錄時機，下列敘述何者正確？", "options": {"A": "販售或進口前。", "B": "販售或進口時。", "C": "販售或進口後。", "D": "以上皆可。"}, "answer": "A"}, {"id": 76, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 76, "question": "遙控無人機製造者與進口者應向哪個機關申請產品資訊登錄？", "options": {"A": "內政部。", "B": "科技部。", "C": "民航局。", "D": "經濟部。"}, "answer": "C"}, {"id": 77, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 77, "question": "最大起飛重量25公斤以上之遙控無人機因系統設計、製造或改裝缺失而致有不安全情況時，下列何者為非？", "options": {"A": "設計者應針對該缺失採取補正措施。", "B": "製造者應針對該缺失採取補正措施。", "C": "改裝者應針對該缺失採取補正措施。", "D": "無須採取任何補正措施。"}, "answer": "D"}, {"id": 78, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 78, "question": "操作政府機關（構）、學校或法人所有遙控無人機之操作人應持有民航局發給之何種證照，始得操作？", "options": {"A": "機師檢定證。", "B": "操作證。", "C": "維修檢定證。", "D": "鑑定合格證。"}, "answer": "B"}, {"id": 79, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 79, "question": "有關遙控無人機操作證之分類，下列何者為非？", "options": {"A": "暫時操作證。", "B": "普通操作證。", "C": "專業操作證。", "D": "學習操作證。"}, "answer": "A"}, {"id": 80, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 80, "question": "自然人欲以遙控無人機從事休閒娛樂用途，下列有關考照需求敘述何者正確？", "options": {"A": "操作10公斤且裝置導航設備之遙控無人機不需考照。", "B": "操作未達2公斤之遙控無人機不須考照。", "C": "操作15公斤以上之遙控無人機僅需通過學科測驗。", "D": "操作未達2公斤之遙控無人機須通過學科測驗。"}, "answer": "B"}, {"id": 81, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 81, "question": "申請遙控無人機專業操作證者，其術科測驗應於學科測驗通過日起多久內完成，否則應重新申請學科測驗？", "options": {"A": "3個月內。", "B": "6個月內。", "C": "9個月內。", "D": "1年內。"}, "answer": "D"}, {"id": 82, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 82, "question": "操作人從事遙控無人機活動，應於何時依製造者所提供之維修指引對遙控無人機系統進行檢查，以符合安全飛航條件後始得活動？", "options": {"A": "應於飛航活動前執行。", "B": "應於飛航活動後執行。", "C": "應於飛航活動中執行。", "D": "任何時間均可執行。"}, "answer": "A"}, {"id": 83, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 83, "question": "操作人從事遙控無人機飛航活動前，下列何者非為主要考量因素？", "options": {"A": "氣象條件。", "B": "空域、飛航限制。", "C": "其他空中或地面之危害因素。", "D": "操作者家庭狀況。"}, "answer": "D"}, {"id": 84, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 84, "question": "有關操作人欲於載具上操作遙控無人機以進行飛航活動，下列敘述何者錯誤？", "options": {"A": "可於固定之導控站上操作。", "B": "可於固定之車輛上操作。", "C": "可於移動中之航空器上操作。", "D": "可於固定之船艦上操作。"}, "answer": "C"}, {"id": 85, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 85, "question": "哪些單位應檢附文件向民航局申請核准後，始得從事遙控無人機飛航活動？", "options": {"A": "政府機關（構）。", "B": "學校。", "C": "法人。", "D": "以上皆是。"}, "answer": "D"}, {"id": 86, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 86, "question": "政府機關（構）、學校或法人欲於直轄市、縣（市）政府公告之禁止、限制區域內從事遙控無人機飛航活動者，應至少於活動日前多久檢附計畫書提出申請？", "options": {"A": "30日前。", "B": "20日前。", "C": "15日前。", "D": "10日前。"}, "answer": "C"}, {"id": 87, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 87, "question": "最大起飛重量2公斤以上且裝置導航設備之遙控無人機遭受實質損害或失蹤時，所有人或操作人應於發生或得知消息後多久內填具飛航安全相關事件報告表通報民航局？", "options": {"A": "6小時內。", "B": "12小時內。", "C": "24小時內。", "D": "48小時內。"}, "answer": "C"}, {"id": 88, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 88, "question": "當遙控無人機發生與其他航空器或障礙物接近或碰撞之事故時，所有人或操作人應於發生或得知消息後多久內填具飛航安全相關事件報告表通報民航局？", "options": {"A": "6小時內。", "B": "12小時內。", "C": "24小時內。", "D": "48小時內。"}, "answer": "C"}, {"id": 89, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 89, "question": "當發生遙控無人機飛航安全相關事件時，民航局針對操作人可採取哪項措施？", "options": {"A": "得逕為暫停其操作或飛航活動。", "B": "經操作人同意後，得暫停其操作或飛航活動。", "C": "經所在地方政府同意後，得暫停其操作或飛航活動。", "D": "需待調查結束後並經操作人同意，使得暫停其操作或飛航活動。"}, "answer": "A"}, {"id": 90, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 90, "question": "根據「遙控無人機管理規則」內容，各項申請及通報作業可透過何處以電子化方式為之？", "options": {"A": "地方政府所建置之資訊系統。", "B": "民航局所指定之資訊系統。", "C": "財政部所建置資訊系統。", "D": "經濟部所建置資訊系統。"}, "answer": "B"}, {"id": 91, "chapter": 1, "chapterName": "民用航空法及相關法規", "numberInChapter": 91, "question": "有關操作人從事遙控無人機飛航活動時應注意之距離限制，下列何者為正確？", "options": {"A": "應至少距高速公路範圍10公尺以上。", "B": "應至少距高架鐵路範圍20公尺以上。", "C": "應至少距建築物及障礙物範圍30公尺以上。", "D": "以上均正確。 第二章基礎飛行原理"}, "answer": "C"}, {"id": 92, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 1, "question": "遙控無人機系統包含下列哪項主要次系統？", "options": {"A": "遙控無人機體。", "B": "遙控設備。", "C": "通訊及控制信號鏈路。", "D": "以上皆是。"}, "answer": "D"}, {"id": 93, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 2, "question": "遙控無人機系統之飛行載具，包括下列哪些項目？", "options": {"A": "機體、負載設備及酬載。", "B": "機體、燃料或電池。", "C": "機體、燃料或電池、負載設備及酬載。", "D": "機體、燃料或電池、負載設備及酬載、遙控設備。"}, "answer": "C"}, {"id": 94, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 3, "question": "遙控無人機系統之地面控制站的硬體設備，包括下列哪個項目？", "options": {"A": "訊號傳輸設備。", "B": "指令傳輸設備。", "C": "資訊接收分析設備。", "D": "以上皆是。"}, "answer": "D"}, {"id": 95, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 4, "question": "遙控無人飛機起飛時，除跑道起飛外，還可運用下列哪項裝置？", "options": {"A": "火箭助推。", "B": "彈射軌道發射。", "C": "人力拋擲。", "D": "以上皆是。"}, "answer": "D"}, {"id": 96, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 5, "question": "遙控無人飛機降落時，除跑道降落外，也可運用下列哪項方式？", "options": {"A": "攔截網。", "B": "纜線勾鎖。", "C": "降落傘。", "D": "以上皆是。"}, "answer": "D"}, {"id": 97, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 6, "question": "遙控無人機許多層面都還是要由人員來掌握及操控，所以下列哪個因素在整體飛行過程中佔了很重要的一部分？", "options": {"A": "人為因素。", "B": "運氣因素。", "C": "社會因素。", "D": "歷史因素。"}, "answer": "A"}, {"id": 98, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 7, "question": "完整之飛控系統包括下列哪個部分？", "options": {"A": "感測器。", "B": "機載計算機。", "C": "伺服器。", "D": "以上皆是。"}, "answer": "D"}, {"id": 99, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 8, "question": "完整之飛控系統可實現遙控無人機下列哪項功能？", "options": {"A": "姿態穩定和控制。", "B": "任務管理。", "C": "緊急控制模式。", "D": "以上皆是。"}, "answer": "D"}, {"id": 100, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 9, "question": "下列哪個是飛行控制系統的輸入裝置，用以保持控制精度？", "options": {"A": "機載計算機。", "B": "感測器。", "C": "伺服器。", "D": "以上皆是。"}, "answer": "B"}, {"id": 101, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 10, "question": "導航系統提供遙控無人機哪項資訊？", "options": {"A": "位置。", "B": "速度。", "C": "飛行姿態。", "D": "以上皆是。"}, "answer": "D"}, {"id": 102, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 11, "question": "遙控無人機導航系統主要分為下列哪兩種？", "options": {"A": "非自主（如GPS）和自主（慣性導航）。", "B": "高精度和一般精度。", "C": "高抗干擾和低抗干擾。", "D": "全自動和半自動。"}, "answer": "A"}, {"id": 103, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 12, "question": "遙控無人機非自主（如GPS）導航系統有下列哪個缺點？", "options": {"A": "操作困難。", "B": "易受干擾。", "C": "誤差積累增大。", "D": "以上皆是。"}, "answer": "B"}, {"id": 104, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 13, "question": "遙控無人機自主（慣性導航）導航系統有下列哪個缺點？", "options": {"A": "操作困難。", "B": "易受干擾。", "C": "誤差積累增大。", "D": "以上皆是。"}, "answer": "C"}, {"id": 105, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 14, "question": "遙控無人機將朝向下列哪個方向繼續發展？", "options": {"A": "高精度。", "B": "高可靠度。", "C": "高抗干擾。", "D": "以上皆是。"}, "answer": "D"}, {"id": 106, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 15, "question": "遙控無人機導航與自動避讓系統的發展，包括下列哪項重點？", "options": {"A": "慣性導航。", "B": "多感應器融合、GPS。", "C": "光電系統技術整合。", "D": "以上皆是。"}, "answer": "D"}, {"id": 107, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 16, "question": "遙控無人機的動力系統，都朝向下列哪個方向發展？", "options": {"A": "體積小、重量輕。", "B": "成本低。", "C": "可靠度高。", "D": "以上皆是。"}, "answer": "D"}, {"id": 108, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 17, "question": "遙控無人機的能量來源可以包括下列哪項？", "options": {"A": "太陽能。", "B": "氫能。", "C": "鋰電池。", "D": "以上皆是。"}, "answer": "D"}, {"id": 109, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 18, "question": "負責對遙控無人機之命令與控制、資料鏈路等工作的，是下列哪個系統？", "options": {"A": "動力系統。", "B": "無線通訊系統。", "C": "導航系統。", "D": "飛行控制系統。"}, "answer": "B"}, {"id": 110, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 19, "question": "遙控無人機控制鏈路為保密與抗干擾基本上已全面採行下列哪種方式？", "options": {"A": "類比化。", "B": "模組化。", "C": "數位化。", "D": "離散化。"}, "answer": "C"}, {"id": 111, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 20, "question": "遙控無人機的圖傳主要資料傳輸形態有下列哪幾種方式？", "options": {"A": "高速、寬頻。", "B": "類比、數位。", "C": "單工、衛星。", "D": "雙工、衛星。"}, "answer": "B"}, {"id": 112, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 21, "question": "遙控無人機的通訊技術朝向下列哪個方向發展？", "options": {"A": "高速、寬頻。", "B": "保密。", "C": "抗干擾。", "D": "以上皆是。"}, "answer": "D"}, {"id": 113, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 22, "question": "隨著機載感測器精度和任務複雜度的上升，機載處理器的下列哪項需求也將隨之提高？", "options": {"A": "運算需求。", "B": "保密需求。", "C": "抗干擾需求。", "D": "重量需求。"}, "answer": "A"}, {"id": 114, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 23, "question": "所謂航空器，係指任何藉空氣之下列哪種力，得以飛航於大氣中之器物？", "options": {"A": "摩擦力。", "B": "靜電力。", "C": "反作用力。", "D": "以上皆是。"}, "answer": "C"}, {"id": 115, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 24, "question": "遙控無人機比空氣重，無法只藉由空氣的浮力而上升，需要相對應的下列哪個項目在空中飛行？", "options": {"A": "能量。", "B": "機身外表顏色。", "C": "起落架材質。", "D": "以上皆是。"}, "answer": "A"}, {"id": 116, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 25, "question": "航空器利用噴射推力或是螺旋槳的拉力，使航空器產生下列哪種力而在空中飛行？", "options": {"A": "內力。", "B": "升力。", "C": "彈力。", "D": "以上皆是。"}, "answer": "B"}, {"id": 117, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 26, "question": "飛行速度快、酬載大、飛行效率高，不需太複雜控制，就可自行抵抗氣流而自行保持穩定的飛行的遙控無人機，是下列哪種遙控無人機？", "options": {"A": "遙控無人直昇機。", "B": "遙控無人飛機。", "C": "遙控無人多旋翼機。", "D": "以上皆是。"}, "answer": "B"}, {"id": 118, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 27, "question": "遙控無人飛機缺點是需要有下列哪個項目供起降之用？", "options": {"A": "相當的跑道高度。", "B": "相當的跑道溫度。", "C": "相當的跑道長度。", "D": "以上皆是。"}, "answer": "C"}, {"id": 119, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 28, "question": "透過旋翼槳葉產生升力，同時也能產生推力的遙控無人機，是下列哪種遙控無人機？", "options": {"A": "遙控無人直昇機。", "B": "遙控無人飛機。", "C": "遙控無人多旋翼機。", "D": "以上皆是。"}, "answer": "A"}, {"id": 120, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 29, "question": "無人直昇機可以執行下列哪個動作？", "options": {"A": "自由調整姿態。", "B": "定點盤旋。", "C": "起飛與落地。", "D": "以上皆是。"}, "answer": "D"}, {"id": 121, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 30, "question": "透過三個以上垂直旋翼間協調來控制姿態，同樣不需跑道，可垂直起降、空中懸停等的遙控無人機，是下列哪種遙控無人機？", "options": {"A": "無人多旋翼機。", "B": "無人直昇機。", "C": "無人飛機。", "D": "以上皆是。"}, "answer": "A"}, {"id": 122, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 31, "question": "操作人只要在遙控設備上施加桿力，就可改變遙控無人機的下列哪些性能？", "options": {"A": "重量或重心。", "B": "外形或顏色。", "C": "方向或速度。", "D": "翼展與翼弦。"}, "answer": "C"}, {"id": 123, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 32, "question": "若無人飛機在地面上靜止，依牛頓運動定律，下列哪個特性會使得飛機保持靜止？", "options": {"A": "慣性。", "B": "磁性。", "C": "氣壓。", "D": "空氣濕度。"}, "answer": "A"}, {"id": 124, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 33, "question": "若無人飛機保持固定的空速以直線行進，依牛頓運動定律，下列哪個特性會使得飛機持續保持穩定的直線飛行？", "options": {"A": "磁性。", "B": "氣壓。", "C": "慣性。", "D": "空氣濕度。"}, "answer": "C"}, {"id": 125, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 34, "question": "無人飛機於頂風飛行時，地面速度就會有下列哪種變化？", "options": {"A": "變快。", "B": "不變。", "C": "變慢。", "D": "以上皆非。"}, "answer": "C"}, {"id": 126, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 35, "question": "若風從無人飛機前方的任一方向吹來，倘若飛行員沒有隨之修正，那下列哪個特性就會受到風所施加的力而改變？", "options": {"A": "重量。", "B": "重心。", "C": "航向。", "D": "推力。"}, "answer": "C"}, {"id": 127, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 36, "question": "噴射機將燃燒的熱氣體往後推送以施加作用力，相對的有相等且相反的下列哪種力，將飛機往前推進？", "options": {"A": "反作用力。", "B": "摩擦力。", "C": "靜電力。", "D": "磁力。"}, "answer": "A"}, {"id": 128, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 37, "question": "遙控無人機在空中飛行時，會受到下列哪些力相互作用的影響？", "options": {"A": "升力、推力。", "B": "推力、阻力。", "C": "阻力、重力。", "D": "以上皆是。"}, "answer": "D"}, {"id": 129, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 38, "question": "無人飛機推力由下列哪個組件提供？", "options": {"A": "發動機。", "B": "起落架。", "C": "機翼。", "D": "機身。"}, "answer": "A"}, {"id": 130, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 39, "question": "無人飛機阻力由下列哪個項目產生？", "options": {"A": "地心引力。", "B": "重心。", "C": "空氣。", "D": "發動機。"}, "answer": "C"}, {"id": 131, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 40, "question": "無人飛機升力由下列哪個項目提供？", "options": {"A": "起落架。", "B": "機翼。", "C": "重心。", "D": "地心引力。"}, "answer": "B"}, {"id": 132, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 41, "question": "重力由下列哪個項目產生？", "options": {"A": "空氣。", "B": "地心引力。", "C": "發動機。", "D": "機翼。"}, "answer": "B"}, {"id": 133, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 42, "question": "飛機等速直線飛行時，縱軸(X 軸)方向阻力與推力大小相同方向相反，所以有下列哪種情況？", "options": {"A": "橫軸(Y 軸)方向合力為零，飛機無升降起伏。", "B": "垂直軸(Z 軸)方向合力為零，飛機無偏航的姿態。", "C": "縱軸(X 軸)方向合力為零，飛機速度不變。", "D": "以上皆是。"}, "answer": "C"}, {"id": 134, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 43, "question": "飛機高度保持時，垂直軸(Z 軸)方向升力與重力大小相同方向相反，所以有下列哪種情況？", "options": {"A": "橫軸(Y 軸)方向合力為零，飛機無偏航的姿態。", "B": "垂直軸(Z 軸)方向合力為零，飛機無升降起伏。", "C": "縱軸(X 軸)方向合力為零，飛機速度不變。", "D": "以上皆是。"}, "answer": "B"}, {"id": 135, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 44, "question": "連續性定理闡述了流體在流動中，下列哪些項目之間的關係？", "options": {"A": "流速和管道切面。", "B": "流速和溫度。", "C": "管道切面和溫度。", "D": "溫度和壓力。"}, "answer": "A"}, {"id": 136, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 45, "question": "連續性定理闡述了流體在流動中，流速和管道切面相關，而且下列哪些項目也相關？", "options": {"A": "流速和壓力。", "B": "流速和溫度。", "C": "管道切面和溫度。", "D": "溫度和壓力。"}, "answer": "A"}, {"id": 137, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 46, "question": "柏努利定律說明流體在一個管道中流動時，有下列哪種現象？", "options": {"A": "流速大的地方壓力大，流速小的地方壓力小。", "B": "流速大的地方壓力大，流速小的地方壓力也大。", "C": "流速大的地方壓力小，流速小的地方壓力大。", "D": "流速大的地方壓力小，流速小的地方壓力也小。"}, "answer": "C"}, {"id": 138, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 47, "question": "柏努利定律目的是要闡述流體在流動中時，下列哪些項目間的關係？", "options": {"A": "流速和溫度。", "B": "流速和壓力。", "C": "溫度和壓力。", "D": "以上皆非。"}, "answer": "B"}, {"id": 139, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 48, "question": "柏努利定律中提到，如果流體的速度越快，流體中的壓力就會有下列哪種現象？", "options": {"A": "越小。", "B": "越大。", "C": "不變。", "D": "有時越小有時越大。"}, "answer": "A"}, {"id": 140, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 49, "question": "遙控無人機的機翼或旋翼是下列哪種外力主要產生的地方？", "options": {"A": "阻力。", "B": "升力。", "C": "推力。", "D": "重力。"}, "answer": "B"}, {"id": 141, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 50, "question": "基於連續性定理、柏努利定律兩個理論，我們可以知道機翼上、下表面會出現下列哪種現象？", "options": {"A": "溫度差。", "B": "壓力差。", "C": "濕度差。", "D": "比熱差。"}, "answer": "B"}, {"id": 142, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 51, "question": "垂直於相對氣流方向的壓力差之總和就是下列哪種外力？", "options": {"A": "槳葉本身的攻角設計。", "B": "空氣的阻力。", "C": "機翼的升力。", "D": "地心引力。"}, "answer": "C"}, {"id": 143, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 52, "question": "螺旋槳產生的推力是藉由下列哪個項目而成？", "options": {"A": "槳葉本身的攻角設計。", "B": "螺旋槳轉速。", "C": "以上皆是。", "D": "以上皆非。"}, "answer": "C"}, {"id": 144, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 53, "question": "螺旋槳轉速通常以下列哪個項目來表示？", "options": {"A": "每秒徑度（rad/s）。", "B": "每分鐘轉數（RPM）。", "C": "赫茲 (Hz)。", "D": "每分鐘徑度（rad/min）。"}, "answer": "B"}, {"id": 145, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 54, "question": "一般螺旋槳攻角最大的位置在槳葉的下列哪個位置？", "options": {"A": "槳葉根部。", "B": "槳葉葉尖。", "C": "槳葉中尖。", "D": "以上皆是。"}, "answer": "A"}, {"id": 146, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 55, "question": "飛機螺旋槳在原廠設計時，為了設計出高效率的槳葉角度，係依據發動機及飛機的下列哪些特性做為基礎？", "options": {"A": "銷量和價格。", "B": "耗油量和扭力。", "C": "壓縮比和衝程。", "D": "轉速和空速。"}, "answer": "D"}, {"id": 147, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 56, "question": "航空器於飛行中，在空氣裡會有下列哪種外力？", "options": {"A": "各種彈力。", "B": "各種阻力。", "C": "各種磁力。", "D": "各種正向力。"}, "answer": "B"}, {"id": 148, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 57, "question": "某外力係與飛機運動方向相反的空氣動力，會阻礙飛機的前進，它是下列哪種外力？", "options": {"A": "阻力。", "B": "升力。", "C": "重力。", "D": "推力。"}, "answer": "A"}, {"id": 149, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 58, "question": "寄生阻力可分為下列哪幾種？", "options": {"A": "摩擦阻力。", "B": "形狀阻力。", "C": "干擾阻力。", "D": "以上皆是。"}, "answer": "D"}, {"id": 150, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 59, "question": "對於高速遙控無人機而言，除了摩擦阻力、形狀阻力、誘導阻力和干擾阻力外，還會另外產生下列哪種阻力？", "options": {"A": "震波阻力。", "B": "布斯曼阻力。", "C": "達倫伯特阻力。", "D": "雷諾阻力。"}, "answer": "A"}, {"id": 151, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 60, "question": "下列哪個項目是空氣產生摩擦力的主要物理特性？", "options": {"A": "粘性。", "B": "低汙染。", "C": "PM2.5。", "D": "高揮發性。"}, "answer": "A"}, {"id": 152, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 61, "question": "空氣流經飛機表面發生摩擦，產生一個阻止飛機前進的力，這個力就是下列哪種阻力？", "options": {"A": "形狀阻力。", "B": "誘導阻力。", "C": "摩擦阻力。", "D": "干擾阻力。"}, "answer": "C"}, {"id": 153, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 62, "question": "摩擦阻力的大小，決定於下列哪個特性？", "options": {"A": "空氣的粘性。", "B": "飛機的表面狀況。", "C": "同空氣相接觸的飛機表面積。", "D": "以上皆是。"}, "answer": "D"}, {"id": 154, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 63, "question": "空氣粘性越大，摩擦阻力就會有下列哪種變化？", "options": {"A": "越小。", "B": "越大。", "C": "不變。", "D": "以上皆非。"}, "answer": "B"}, {"id": 155, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 64, "question": "飛機表面越粗糙，摩擦阻力就會有下列哪種變化？", "options": {"A": "越小。", "B": "不變。", "C": "越大。", "D": "以上皆非。"}, "answer": "C"}, {"id": 156, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 65, "question": "飛機表面積越大，摩擦阻力就會有下列哪種變化？", "options": {"A": "越大。", "B": "越小。", "C": "不變。", "D": "以上皆非。"}, "answer": "A"}, {"id": 157, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 66, "question": "由前後壓力差形成的阻力叫下列哪種阻力？", "options": {"A": "摩擦阻力。", "B": "形狀阻力。", "C": "誘導阻力。", "D": "干擾阻力。"}, "answer": "B"}, {"id": 158, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 67, "question": "人在逆風中行走，會感到阻力的作用，這就是下列哪種阻力？", "options": {"A": "摩擦阻力。", "B": "誘導阻力。", "C": "形狀阻力。", "D": "干擾阻力。"}, "answer": "C"}, {"id": 159, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 68, "question": "遙控無人飛機的機身與尾翼接合部分因氣流相互干擾，都會產生下列哪種阻力？", "options": {"A": "摩擦阻力。", "B": "形狀阻力。", "C": "誘導阻力。", "D": "干擾阻力。"}, "answer": "D"}, {"id": 160, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 69, "question": "因升力產生渦流而發生的阻力稱為下列哪種阻力？", "options": {"A": "摩擦阻力。", "B": "誘導阻力。", "C": "形狀阻力。", "D": "干擾阻力。"}, "answer": "B"}, {"id": 161, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 70, "question": "誘導阻力是遙控無人機為產生下列哪種外力而須付出的一種代價？", "options": {"A": "磁力。", "B": "推力。", "C": "升力。", "D": "重力。"}, "answer": "C"}, {"id": 162, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 71, "question": "干擾阻力是遙控無人機各部分之間因下列哪種因素而產生的一種額外阻力？", "options": {"A": "氣流相互干擾。", "B": "熱流相互作用。", "C": "濕度相互作用。", "D": "磁力相互作用。"}, "answer": "A"}, {"id": 163, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 72, "question": "干擾阻力容易產生在下列哪些組件之間？", "options": {"A": "機身和機翼、機身和尾翼。", "B": "機翼和外掛載。", "C": "機翼、發動機短艙。", "D": "以上皆是。"}, "answer": "D"}, {"id": 164, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 73, "question": "重力是航空器本身之質量所受的下列哪種外力？", "options": {"A": "磁力。", "B": "地心引力。", "C": "摩擦力。", "D": "靜電力。"}, "answer": "B"}, {"id": 165, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 74, "question": "過重的重力對飛行有負面影響，故無人機機身的設計都是採用下列哪種材質？", "options": {"A": "較輕。", "B": "較重。", "C": "時重時輕。", "D": "以上皆非。"}, "answer": "A"}, {"id": 166, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 75, "question": "升力和阻力是飛機在空氣之間的下列哪種行為中產生？", "options": {"A": "分子光譜。", "B": "動量守恆。", "C": "相對運動 （相對氣流）。", "D": "雷諾傳輸。"}, "answer": "C"}, {"id": 167, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 76, "question": "影響升力和阻力的基本因素除了飛機本身的特點，還有下列哪個因素？", "options": {"A": "機翼在氣流中的相對位置（攻角）。", "B": "氣流的速度。", "C": "空氣密度。", "D": "以上皆是。"}, "answer": "D"}, {"id": 168, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 77, "question": "相對氣流方向與翼弦所夾的角度叫下列哪個角？", "options": {"A": "俯仰角。", "B": "滾轉角。", "C": "攻角。", "D": "偏航角。"}, "answer": "C"}, {"id": 169, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 78, "question": "在飛行速度等其它條件相同的情況下，得到最大升力的攻角，叫做下列哪個項目？", "options": {"A": "理想攻角。", "B": "臨界攻角。", "C": "牛頓攻角。", "D": "萊布尼茲攻角。"}, "answer": "B"}, {"id": 170, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 79, "question": "在小於臨界攻角範圍內增大攻角，會有下列哪種結果？", "options": {"A": "升力增大。", "B": "升力減少。", "C": "升力不變。", "D": "以上皆非。"}, "answer": "A"}, {"id": 171, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 80, "question": "空氣密度大，相對氣流速度快，升力和阻力會有下列哪種變化？", "options": {"A": "升力越大、阻力越小。", "B": "升力越小、阻力越大。", "C": "升力和阻力越大。", "D": "升力和阻力越小。"}, "answer": "C"}, {"id": 172, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 81, "question": "機翼面積大，升力和阻力會有下列哪種變化？", "options": {"A": "升力越大、阻力越小。", "B": "升力越小、阻力越大。", "C": "升力和阻力越小。", "D": "升力和阻力越大。"}, "answer": "D"}, {"id": 173, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 82, "question": "升力和阻力與機翼面積大小的關係是下列哪種？", "options": {"A": "都與機翼面積大小成正比。", "B": "都與機翼面積大小成反比。", "C": "都與機翼面積大小的平方成正比。", "D": "都與機翼面積大小的平方成反比。"}, "answer": "A"}, {"id": 174, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 83, "question": "機翼形狀對下列哪個項目有很大影響？", "options": {"A": "磁力。", "B": "升力、阻力。", "C": "重力。", "D": "以上皆是。"}, "answer": "B"}, {"id": 175, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 84, "question": "下列哪個項目對升力、阻力有影響？", "options": {"A": "機翼切面形狀的相對厚度、最大厚度位置。", "B": "機翼平面形狀、襟翼和前緣翼縫的位置。", "C": "機翼表面光滑狀況。", "D": "以上皆是。"}, "answer": "D"}, {"id": 176, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 85, "question": "遙控無人機表面光滑狀況會影響下列哪種阻力？", "options": {"A": "形狀阻力。", "B": "誘導阻力。", "C": "摩擦阻力。", "D": "干擾阻力。"}, "answer": "C"}, {"id": 177, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 86, "question": "遙控無人機表面相對光滑，則阻力為下列哪種變化？", "options": {"A": "相對較小。", "B": "相對較大。", "C": "時大時小。", "D": "以上皆非。"}, "answer": "A"}, {"id": 178, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 87, "question": "大多數遙控無人機都由下列哪個主要部分組成？", "options": {"A": "機翼、機身、尾翼。", "B": "起降裝置。", "C": "動力系統。", "D": "以上皆是。"}, "answer": "D"}, {"id": 179, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 88, "question": "無人飛機機翼的主要功用是產生下列哪種外力？", "options": {"A": "阻力。", "B": "升力。", "C": "推力。", "D": "重力。"}, "answer": "B"}, {"id": 180, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 89, "question": "無人飛機機翼除提供升力外，也有下列哪些作用？", "options": {"A": "美觀和舒適。", "B": "潤滑和保濕。", "C": "穩定和操作。", "D": "觀測和定位。"}, "answer": "C"}, {"id": 181, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 90, "question": "在無人飛機機翼上一般安裝下列哪個物件？", "options": {"A": "光學酬載。", "B": "副翼和襟翼。", "C": "通訊設備。", "D": "導航設備。"}, "answer": "B"}, {"id": 182, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 91, "question": "操縱無人飛機副翼可使飛機產生下列哪種結果？", "options": {"A": "滾轉。", "B": "爬升。", "C": "下降。", "D": "偏航。"}, "answer": "A"}, {"id": 183, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 92, "question": "無人飛機機翼還可安裝下列哪個物件？", "options": {"A": "發動機。", "B": "起落架。", "C": "外掛載。", "D": "以上皆是。"}, "answer": "D"}, {"id": 184, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 93, "question": "無人飛機機身的主要功用是裝載下列哪個物件？", "options": {"A": "油箱。", "B": "酬載。", "C": "各種設備。", "D": "以上皆是。"}, "answer": "D"}, {"id": 185, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 94, "question": "無人飛機尾翼包括下列哪些物件？", "options": {"A": "大尾翼和小尾翼。", "B": "高速尾翼和低速尾翼。", "C": "水平尾翼和垂直尾翼。", "D": "旋轉尾翼和固定尾翼。"}, "answer": "C"}, {"id": 186, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 95, "question": "無人飛機水平尾翼包括下列哪些物件？", "options": {"A": "固定的升降舵和可動的水平安定面。", "B": "固定的水平安定面和可動的升降舵。", "C": "固定的升降舵和水平安定面。", "D": "可動的升降舵和水平安定面。"}, "answer": "B"}, {"id": 187, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 96, "question": "無人飛機垂直尾翼包括下列哪些物件？", "options": {"A": "固定的方向舵和可動的垂直安定面。", "B": "固定的垂直安定面和可動的方向舵。", "C": "固定的方向舵和垂直安定面。", "D": "可動的方向舵和垂直安定面。"}, "answer": "B"}, {"id": 188, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 97, "question": "無人飛機的起落架大都由下列哪些物件組成？", "options": {"A": "減震支柱和機輪。", "B": "蒙皮和鉚釘。", "C": "坡頂桁架和平行弦桁架。", "D": "拉力元件和扭力元件。"}, "answer": "A"}, {"id": 189, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 98, "question": "起落架的作用是在下列哪個時機支撐無人飛機?", "options": {"A": "起飛時。", "B": "著陸滑跑時。", "C": "地面滑行和停放時。", "D": "以上皆是。"}, "answer": "D"}, {"id": 190, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 99, "question": "動力系統主要用來產生使遙控無人機前進的下列哪些力？", "options": {"A": "重力與升力。", "B": "重力與阻力。", "C": "拉力和推力。", "D": "升力與阻力。"}, "answer": "C"}, {"id": 191, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 100, "question": "無人飛機常見的動力系統有下列哪個項目？", "options": {"A": "航空活塞式發動機加螺旋槳推進器。", "B": "渦輪噴氣發動機。", "C": "渦輪螺旋槳發動機和渦輪扇或導風扇發動機。", "D": "以上皆是。"}, "answer": "D"}, {"id": 192, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 101, "question": "無人飛機上通常不會安裝下列哪種設備？", "options": {"A": "飛行儀表。", "B": "通訊設備、導航設備。", "C": "安全設備。", "D": "以上皆是。"}, "answer": "A"}, {"id": 193, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 102, "question": "操作人操作油門和操縱桿，控制無人機的操縱面，來達到所想要的下列哪個目的？", "options": {"A": "飛行姿態。", "B": "發動機溫度。", "C": "環境濕度。", "D": "酬載功能。"}, "answer": "A"}, {"id": 194, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 103, "question": "想像為一條由前往後穿過航空器的軸，稱之為下列哪個軸？", "options": {"A": "航空器縱軸（X 軸）。", "B": "航空器橫軸（Y 軸）。", "C": "航空器垂直軸（Z 軸）。", "D": "以上皆非。"}, "answer": "A"}, {"id": 195, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 104, "question": "除了副翼，航空器的下列哪個組件對於航空器的滾轉也會有影響？", "options": {"A": "升降舵。", "B": "襟翼。", "C": "方向舵。", "D": "小翼。"}, "answer": "C"}, {"id": 196, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 105, "question": "想像為一條上下兩面垂直地穿過航空器的軸，稱之為下列哪個軸？", "options": {"A": "航空器垂直軸（Z 軸）。", "B": "航空器縱軸（X 軸）。", "C": "航空器橫軸（Y 軸）。", "D": "以上皆非。"}, "answer": "A"}, {"id": 197, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 106, "question": "關於遙控無人機的的操作原理，我們首要了解遙控無人飛機的下列哪種特性？", "options": {"A": "平衡性。", "B": "穩定性。", "C": "操縱性。", "D": "以上皆是。"}, "answer": "D"}, {"id": 198, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 107, "question": "遙控無人機處於平衡狀態時，是表示下列哪種狀況？", "options": {"A": "其速度的大小和方向都保持不變。", "B": "其發動機的轉速和馬力都保持不變。", "C": "其所有翼面的角度和方向都保持不變。", "D": "其酬載的方向和功能都保持不變。"}, "answer": "A"}, {"id": 199, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 108, "question": "遙控無人機穩定性的強弱，一般由下列哪個現象來衡量？", "options": {"A": "擺動衰減時間。", "B": "擺動幅度。", "C": "擺動次數。", "D": "以上皆是。"}, "answer": "D"}, {"id": 200, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 109, "question": "遙控無人機的穩定性強，表示下列哪個現象？", "options": {"A": "擺動衰減時間短。", "B": "擺動幅度小。", "C": "擺動次數少。", "D": "以上皆是。"}, "answer": "D"}, {"id": 201, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 110, "question": "遙控無人機穩定性的強弱，主要取決於遙控無人機的下列哪個特性？", "options": {"A": "重心位置。", "B": "飛行速度和高度。", "C": "攻角的變化。", "D": "以上皆是。"}, "answer": "D"}, {"id": 202, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 111, "question": "遙控無人機在操作人操縱升降舵、方向舵和副翼下改變其飛行狀態的俯仰、方向和橫向之特性，是指遙控無人機的下列哪種特性？", "options": {"A": "操縱性。", "B": "平衡性。", "C": "穩定性。", "D": "以上皆非。"}, "answer": "A"}, {"id": 203, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 112, "question": "遙控無人機操縱性好，表示下列哪個現象？", "options": {"A": "操縱動作簡單。", "B": "操縱省力。", "C": "操縱反應快。", "D": "以上皆是。"}, "answer": "D"}, {"id": 204, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 113, "question": "遙控無人機操作有哪四大基本動作？", "options": {"A": "平直飛行、側滑、爬升、下降。", "B": "平直飛行、轉彎、爬升、倒飛。", "C": "平直飛行、轉彎、爬升、下降。", "D": "平直飛行、側滑、懸停、倒飛。"}, "answer": "C"}, {"id": 205, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 114, "question": "操作遙控無人飛機時，當副翼控制右上左下，機體相對於「機體中心」作下列哪種動作？", "options": {"A": "向上俯仰。", "B": "右偏航。", "C": "右滾。", "D": "左滾。"}, "answer": "C"}, {"id": 206, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 115, "question": "操作遙控無人飛機時，當副翼控制右下左上，機體相對於「機體中心」作下列哪種動作？", "options": {"A": "向上俯仰。", "B": "右偏航。", "C": "左滾。", "D": "右滾。"}, "answer": "C"}, {"id": 207, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 116, "question": "操作遙控無人飛機時，當方向舵控制往右，機體相對於「機體中心」作下列哪種動作？", "options": {"A": "向上俯仰。", "B": "右偏航。", "C": "左偏航。", "D": "右滾。"}, "answer": "B"}, {"id": 208, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 117, "question": "操作遙控無人飛機時，當方向舵控制往左，機體相對於「機體中心」作下列哪種動作？", "options": {"A": "右滾。", "B": "左偏航。", "C": "右偏航。", "D": "左滾。"}, "answer": "B"}, {"id": 209, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 118, "question": "控制遙控無人機時，操作人應以相對於下列哪個項目來思考「上」、「下」、「左」、 「右」？", "options": {"A": "機體中心。", "B": "地平面。", "C": "操作人自己的虛擬座標。", "D": "以上皆是。"}, "answer": "A"}, {"id": 210, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 119, "question": "無人直昇機，其主旋翼在旋轉時主要產生下列哪種力？", "options": {"A": "向上的升力。", "B": "向下的升力。", "C": "向前的升力。", "D": "向後的升力。"}, "answer": "A"}, {"id": 211, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 120, "question": "無人直昇機主旋翼產生升力的原理，類似於下列哪個原理？", "options": {"A": "無人飛機機翼產生升力的原理。", "B": "螺旋槳產生推力的原理。", "C": "以上皆是。", "D": "以上皆非。"}, "answer": "C"}, {"id": 212, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 121, "question": "若無人直昇機主旋翼的旋轉面保持在水平位置，則所產生的力是下列哪個方向？", "options": {"A": "垂直向下。", "B": "垂直向上。", "C": "傾斜向下。", "D": "傾斜向上。"}, "answer": "B"}, {"id": 213, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 122, "question": "無人直昇機利用主旋翼產生升力的原理執行下列哪些動作？", "options": {"A": "起飛離地。", "B": "爬升。", "C": "懸停。", "D": "以上皆是。"}, "answer": "D"}, {"id": 214, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 123, "question": "如果升力與推力大於重力與阻力，遙控無人機的運動方向是下列哪個方向？", "options": {"A": "垂直向上。", "B": "垂直向下。", "C": "傾斜向上。", "D": "傾斜向下。"}, "answer": "A"}, {"id": 215, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 124, "question": "無人直昇機主旋翼的槳葉片的俯仰角愈大，就會有下列哪種情形？", "options": {"A": "升力愈大，扭力愈小。", "B": "升力愈大，扭力也愈大。", "C": "升力愈小，也扭力愈小。", "D": "升力愈小，扭力愈大。"}, "answer": "B"}, {"id": 216, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 125, "question": "無人直昇機的尾旋翼主要功能為何？", "options": {"A": "抵消升力，控制機頭方向。", "B": "抵消阻力，控制機頭方向。", "C": "抵消扭力，控制機頭方向。", "D": "抵消重力，控制機頭方向。"}, "answer": "C"}, {"id": 217, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 126, "question": "無人直昇機有下列哪些基本飛行動作？", "options": {"A": "平直飛行。", "B": "轉彎。", "C": "爬升及下降。", "D": "以上皆是。"}, "answer": "D"}, {"id": 218, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 127, "question": "無人直昇機「垂直起飛到懸停」，係指垂直飛離地面約2~3呎，並保持下列哪種狀態？", "options": {"A": "航向不變。", "B": "向左的傾斜狀態。", "C": "向右的傾斜狀態。", "D": "主旋翼轉速不變。"}, "answer": "A"}, {"id": 219, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 128, "question": "無人直昇機「懸停轉彎」，係指在懸停高度執行機鼻向左轉或向右轉，並保持下列哪種狀態不變？", "options": {"A": "相對於其他遙控無人直昇機的位置。", "B": "相對於地面的位置。", "C": "相對於最低雲層的位置。", "D": "以上皆是。"}, "answer": "B"}, {"id": 220, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 129, "question": "無人直昇機「懸停轉彎」，係指保持不變的下列哪種狀態？", "options": {"A": "高度。", "B": "轉彎率。", "C": "轉速。", "D": "以上皆是。"}, "answer": "D"}, {"id": 221, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 130, "question": "無人直昇機向前移動到另一特定位置，稱之為無人直昇機的下列哪種動作？", "options": {"A": "懸停。", "B": "側向懸停飛行。", "C": "向前懸停飛行。", "D": "向後懸停飛行。"}, "answer": "C"}, {"id": 222, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 131, "question": "無人直昇機「向前懸停飛行」，係指保持不變的下列哪種狀態？", "options": {"A": "地面速度。", "B": "高度。", "C": "航向。", "D": "以上皆是。"}, "answer": "D"}, {"id": 223, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 132, "question": "當必須移動無人直昇機到另一特定位置，但當時狀況不可能執行向前飛行時，就要使用下列哪種動作？", "options": {"A": "側向懸停飛行或向後懸停飛行。", "B": "懸停轉彎。", "C": "平直飛行。", "D": "懸停。"}, "answer": "A"}, {"id": 224, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 133, "question": "無人直昇機「側向懸停飛行」，係指保持不變的下列哪種狀態？", "options": {"A": "地面速度。", "B": "高度。", "C": "航向。", "D": "以上皆是。"}, "answer": "D"}, {"id": 225, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 134, "question": "當必須移動無人直昇機到另一特定位置，但當時狀況不可能執行向前或側向懸停飛行時，就要使用下列哪種動作？", "options": {"A": "平直飛行。", "B": "向後懸停飛行。", "C": "懸停轉彎。", "D": "傾斜轉彎。"}, "answer": "B"}, {"id": 226, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 135, "question": "無人直昇機「向後懸停飛行」，係指保持不變的下列哪種狀態？", "options": {"A": "地面速度。", "B": "高度。", "C": "航向。", "D": "以上皆是。"}, "answer": "D"}, {"id": 227, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 136, "question": "無人直昇機「平直飛行」，係指保持下列哪種狀態？", "options": {"A": "高度不變和航向不變。", "B": "高度不變和地面速度不變。", "C": "地面速度不變和航向不變。", "D": "主旋翼轉速不變和航向不變。"}, "answer": "A"}, {"id": 228, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 137, "question": "無人直昇機「傾斜轉彎」，係指保持在向左或向右的傾斜狀態，保持下列哪種狀態之飛行？", "options": {"A": "高度不變和航向不變。", "B": "高度改變，但航向不變。", "C": "高度不變，但航向改變。", "D": "高度改變和航向改變。"}, "answer": "C"}, {"id": 229, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 138, "question": "無人直昇機「偏航」，係指利用尾旋翼推力執行下列哪種操縱？", "options": {"A": "改變高度。", "B": "改變航向。", "C": "改變地面速度。", "D": "改變升力。"}, "answer": "B"}, {"id": 230, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 139, "question": "無人多旋翼機可以下列哪種方式來做區分？", "options": {"A": "旋翼數量。", "B": "旋翼分布位置。", "C": "旋翼是否能夠傾斜。", "D": "以上皆可。"}, "answer": "D"}, {"id": 231, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 140, "question": "無人多旋翼機能夠垂直且穩定的執行下列哪種動作？", "options": {"A": "滾轉及水平平移。", "B": "升降及偏航。", "C": "偏航及水平平移。", "D": "俯仰及水平平移。"}, "answer": "B"}, {"id": 232, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 141, "question": "無人多旋翼機具備優秀的下列哪種能力是一般無人飛機望塵莫及的？", "options": {"A": "垂直起降能力。", "B": "定點懸停能力。", "C": "穩定升降及偏航。", "D": "以上皆是。"}, "answer": "D"}, {"id": 233, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 142, "question": "無人多旋翼機的下列哪種旋翼設計使得操控簡單且直接？", "options": {"A": "參差配置的。", "B": "對稱的。", "C": "不對稱的。", "D": "偏一邊的。"}, "answer": "B"}, {"id": 234, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 143, "question": "定距槳無人多旋翼機與無人直昇機相比，在下列哪個方面有很大提升？", "options": {"A": "機械設計結構。", "B": "控制難度。", "C": "姿態平穩。", "D": "以上皆是。"}, "answer": "D"}, {"id": 235, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 144, "question": "無人多旋翼機對飛行的影響是下列哪項？", "options": {"A": "沒有影響。", "B": "變得複雜。", "C": "變得簡單。", "D": "有時變得複雜，有時變得簡單。"}, "answer": "C"}, {"id": 236, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 145, "question": "無人多旋翼機同時增加或減少每個旋翼的升力，來實現下列哪種飛行狀態？", "options": {"A": "垂直的升降姿態。", "B": "俯仰的姿態。", "C": "偏航的姿態。", "D": "滾轉的姿態。"}, "answer": "A"}, {"id": 237, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 146, "question": "同時影響遙控無人機飛行性能與飛航安全的重要因素是下列哪些項目？", "options": {"A": "機體大小。", "B": "電池容量。", "C": "重量和重心位置。", "D": "以上皆是。"}, "answer": "C"}, {"id": 238, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 147, "question": "操作人在飛行前應確認下列何者在合理範圍內？", "options": {"A": "重量。", "B": "重心。", "C": "酬載。", "D": "以上皆是。"}, "answer": "D"}, {"id": 239, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 148, "question": "遙控無人機操作人在飛行前應詳細考量在下列哪種情況下可能降低飛行性能的載重因素？", "options": {"A": "高海拔。", "B": "高溫。", "C": "高濕度。", "D": "以上皆是。"}, "answer": "D"}, {"id": 240, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 149, "question": "遙控無人機重力的著力點稱為下列哪個項目？", "options": {"A": "形心。", "B": "氣動力中心。", "C": "重心。", "D": "升力中心。"}, "answer": "C"}, {"id": 241, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 150, "question": "遙控無人機的下列哪個項目與穩定性有很大的關聯？", "options": {"A": "外觀。", "B": "重心。", "C": "大小。", "D": "顏色。"}, "answer": "B"}, {"id": 242, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 151, "question": "當遙控無人機重心位置超出允許範圍時，可能導致遙控無人機發生下列哪種情形？", "options": {"A": "無法穩定起飛。", "B": "無法穩定落地。", "C": "失速。", "D": "以上皆是。"}, "answer": "D"}, {"id": 243, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 152, "question": "遙控無人機飛行時，為產生各種姿態，作用於機身上的力為下列哪種情形？", "options": {"A": "升力通常較重量為大。", "B": "升力通常較重量為小。", "C": "有時升力較大，有時重量較大。", "D": "以上皆非。"}, "answer": "A"}, {"id": 244, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 153, "question": "遙控無人機的轉彎率因不同的速度而隨之不同，這是為了要抵銷所增加的下列哪種力， 以保持負載係數不變？", "options": {"A": "向心力。", "B": "離心力。", "C": "正向力。", "D": "扭力。"}, "answer": "B"}, {"id": 245, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 154, "question": "遙控無人機轉彎時，需執行下列哪個動作以補償升力的不足？", "options": {"A": "增加正向力。", "B": "增加攻角。", "C": "增加扭力。", "D": "增加離心力。"}, "answer": "B"}, {"id": 246, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 155, "question": "無人飛機重心位置靠前時，為維持遙控無人機的俯仰平衡，需要尾翼提供下列哪種力？", "options": {"A": "更大的向前的推力。", "B": "更大的向上的升力。", "C": "更大的向下的升力。", "D": "更大的向外的離心力。"}, "answer": "C"}, {"id": 247, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 156, "question": "遙控無人機重心位置靠前時，機頭較為沉重，起飛離地時有下列哪種情形？", "options": {"A": "較為困難。", "B": "較為容易。", "C": "有時容易有時困難。", "D": "以上皆非。"}, "answer": "A"}, {"id": 248, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 157, "question": "無人飛機重心位置靠前時，會有下列哪種情形？", "options": {"A": "減少誘導阻力。", "B": "增大誘導阻力。", "C": "誘導阻力不變。", "D": "以上皆非。"}, "answer": "B"}, {"id": 249, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 158, "question": "無人飛機重心位置靠前時，會有下列哪種情形？", "options": {"A": "油耗增加。", "B": "航程距離降低。", "C": "以上皆是。", "D": "以上皆非。"}, "answer": "C"}, {"id": 250, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 159, "question": "無人飛機重心位置靠前時，提高了下列哪種風險？", "options": {"A": "不穩定進場的風險。", "B": "穩定進場的風險。", "C": "非精確進場的風險。", "D": "精確進場的風險。"}, "answer": "A"}, {"id": 251, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 160, "question": "無人飛機重心後移時，由於機頭較輕，可能會使得起飛時發生下列哪種情形？", "options": {"A": "偏離跑道。", "B": "左右搖擺。", "C": "提前仰轉。", "D": "延後離地。"}, "answer": "C"}, {"id": 252, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 161, "question": "無人飛機重心後移時，起飛爬升時可能會因仰角過大，而造成下列哪種情形？", "options": {"A": "起飛速度增加。", "B": "起飛重量降低。", "C": "失速與機尾擦地。", "D": "以上皆是。"}, "answer": "C"}, {"id": 253, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 162, "question": "無人飛機重心後移時，配平及總阻力減小，也進而導致下列哪種情形？", "options": {"A": "油耗減少。", "B": "續航能力增加。", "C": "失速速度減小。", "D": "以上皆是。"}, "answer": "D"}, {"id": 254, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 163, "question": "無人直昇機重心太靠後，會影響下列哪種性能？", "options": {"A": "高速前飛性能及穩定。", "B": "從地面到正常起飛。", "C": "平直飛行。", "D": "以上皆是。"}, "answer": "A"}, {"id": 255, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 164, "question": "無人多旋翼機重心移動可能造成下列哪種結果？", "options": {"A": "升力增加。", "B": "操控較為困難。", "C": "阻力減少。", "D": "以上皆是。"}, "answer": "B"}, {"id": 256, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 165, "question": "遙控無人機重量增加可能對起飛速度造成下列哪種結果？", "options": {"A": "降低起飛速度。", "B": "起飛速度不變。", "C": "提高起飛速度。", "D": "以上皆非。"}, "answer": "C"}, {"id": 257, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 166, "question": "遙控無人機重量增加可能對滑行距離造成下列哪種結果？", "options": {"A": "縮短起飛滑行距離。", "B": "加長起飛滑行距離。", "C": "起飛滑行距離不變。", "D": "以上皆非。"}, "answer": "B"}, {"id": 258, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 167, "question": "遙控無人機重量增加可能對爬升率及爬升角造成下列哪種結果？", "options": {"A": "降低爬升率和爬升角度。", "B": "增加爬升率和爬升角度。", "C": "爬升率和爬升角度不變。", "D": "以上皆非。"}, "answer": "A"}, {"id": 259, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 168, "question": "遙控無人機重量增加可能對飛航最高高度造成下列哪種結果？", "options": {"A": "降低飛航最高高度。", "B": "增加飛航最高高度。", "C": "飛航最高高度不變。", "D": "以上皆非。"}, "answer": "A"}, {"id": 260, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 169, "question": "遙控無人機重量增加可能對操作性能造成下列哪種結果？", "options": {"A": "操作性能不變。", "B": "增加操作性能。", "C": "降低操作性能。", "D": "以上皆非。"}, "answer": "C"}, {"id": 261, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 170, "question": "遙控無人機重量增加可能對進場及降落速度造成下列哪種結果？", "options": {"A": "降低進場和降落速度。", "B": "提高進場和降落速度。", "C": "進場和降落速度不變。", "D": "以上皆非。"}, "answer": "B"}, {"id": 262, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 171, "question": "遙控無人機重量增加可能對降落滾行距離造成下列哪種結果？", "options": {"A": "加長降落滾行距離。", "B": "縮短降落滾行距離。", "C": "降落滾行距離不變。", "D": "以上皆非。"}, "answer": "A"}, {"id": 263, "chapter": 2, "chapterName": "基礎飛行原理", "numberInChapter": 172, "question": "為確保飛行安全，操作人須審慎確認遙控無人機的下列哪個特性？", "options": {"A": "外觀。", "B": "重量與載重平衡。", "C": "價格。", "D": "以上皆是。 第三章氣象"}, "answer": "B"}, {"id": 264, "chapter": 3, "chapterName": "氣象", "numberInChapter": 1, "question": "當空氣密度增加時，對飛機升力的影響為何者？", "options": {"A": "升力增加。", "B": "升力降低。", "C": "升力不變。", "D": "升力有時增加有時降低。"}, "answer": "A"}, {"id": 265, "chapter": 3, "chapterName": "氣象", "numberInChapter": 2, "question": "下列何者非影響空氣密度之因素？", "options": {"A": "高度。", "B": "溫度。", "C": "濕度。", "D": "應力。"}, "answer": "D"}, {"id": 266, "chapter": 3, "chapterName": "氣象", "numberInChapter": 3, "question": "當空氣中分子較少且稀薄，表示其密度高度為何？", "options": {"A": "越高。", "B": "越低。", "C": "可能高也可能低。", "D": "無法判斷。"}, "answer": "A"}, {"id": 267, "chapter": 3, "chapterName": "氣象", "numberInChapter": 4, "question": "當空氣中分子較多且濃厚，表示其密度高度為何？", "options": {"A": "越高。", "B": "越低。", "C": "可能高也可能低。", "D": "無法判斷。"}, "answer": "B"}, {"id": 268, "chapter": 3, "chapterName": "氣象", "numberInChapter": 5, "question": "高密度高度之環境比較不會出現於下列何處？", "options": {"A": "低海拔處。", "B": "高溫處。", "C": "非常潮濕之處。", "D": "低大氣壓力之處。"}, "answer": "A"}, {"id": 269, "chapter": 3, "chapterName": "氣象", "numberInChapter": 6, "question": "低密度高度之環境比較不會出現於下列何處？", "options": {"A": "大氣壓力極高之處。", "B": "低海拔處。", "C": "乾燥處。", "D": "高溫處。"}, "answer": "D"}, {"id": 270, "chapter": 3, "chapterName": "氣象", "numberInChapter": 7, "question": "空氣可藉由外界的作功達到下列哪種效果？", "options": {"A": "加工成形。", "B": "染色。", "C": "壓縮及膨脹。", "D": "以上皆是。"}, "answer": "C"}, {"id": 271, "chapter": 3, "chapterName": "氣象", "numberInChapter": 8, "question": "於固定空氣體積下，升溫時該體積空氣密度減少，降溫時該體積空氣密度為下列何種變化？", "options": {"A": "增加。", "B": "減少。", "C": "不變。", "D": "有時增加有時減少。"}, "answer": "A"}, {"id": 272, "chapter": 3, "chapterName": "氣象", "numberInChapter": 9, "question": "對流層裡，溫度及壓力均隨高度增加而有下列何種變化？", "options": {"A": "降低。", "B": "增加。", "C": "不變。", "D": "有時增加有時降低。"}, "answer": "A"}, {"id": 273, "chapter": 3, "chapterName": "氣象", "numberInChapter": 10, "question": "下列有關大氣壓力量測之敘述，何者錯誤？", "options": {"A": "國際標準大氣(International Standard Atmosphere，ISA)為各國公認之參考校正基準。", "B": "海平面大氣壓力為29.92英吋汞柱(inHg)。", "C": "一標準大氣壓力等於1017.2毫巴值。", "D": "每上升1,000英呎，氣壓值減少約1英吋汞柱。"}, "answer": "C"}, {"id": 274, "chapter": 3, "chapterName": "氣象", "numberInChapter": 11, "question": "標準一大氣壓的29.92吋汞柱換算成毫巴值為下列哪個數值？", "options": {"A": "10.132。", "B": "101.32。", "C": "1013.2。", "D": "10132。"}, "answer": "C"}, {"id": 275, "chapter": 3, "chapterName": "氣象", "numberInChapter": 12, "question": "大氣壓力之實際值與標準值存在差距，係由於哪項因素所影響？", "options": {"A": "壓力錶廠牌差異。", "B": "地面溫度不平均。", "C": "壓力錶讀法差異。", "D": "壓力錶校正值差異。"}, "answer": "B"}, {"id": 276, "chapter": 3, "chapterName": "氣象", "numberInChapter": 13, "question": "若遙控無人機操作人未能注意大氣壓力實際值與標準值間之差距並適時修正，可能無法精確掌握何項資訊？", "options": {"A": "實際高度。", "B": "實際航向。", "C": "實際滾轉角。", "D": "實際引擎轉速。"}, "answer": "A"}, {"id": 277, "chapter": 3, "chapterName": "氣象", "numberInChapter": 14, "question": "氣象資料顯示某區域之氣壓值有向上提升之趨勢，代表該區域天氣狀況有何種變化？", "options": {"A": "天氣轉壞。", "B": "天氣可能轉好也可能轉壞。", "C": "天氣好轉。", "D": "以上皆非。"}, "answer": "C"}, {"id": 278, "chapter": 3, "chapterName": "氣象", "numberInChapter": 15, "question": "氣象資料顯示某區域之氣壓值有向下降低之趨勢，代表該區域天氣狀況有何種變化？", "options": {"A": "天氣好轉。", "B": "天氣轉壞。", "C": "天氣有時晴朗有時轉壞。", "D": "以上皆非。"}, "answer": "B"}, {"id": 279, "chapter": 3, "chapterName": "氣象", "numberInChapter": 16, "question": "空氣的水平運動稱為？", "options": {"A": "「雲」。", "B": "「風」。", "C": "「霧」。", "D": "「霾」。"}, "answer": "B"}, {"id": 280, "chapter": 3, "chapterName": "氣象", "numberInChapter": 17, "question": "有關風速的單位下列何者為非？", "options": {"A": "公尺/每秒 （m/s）。", "B": "公里/每小時 （km/h）。", "C": "海浬/每小時 （kts）。", "D": "公斤/每小時 （kg）。"}, "answer": "D"}, {"id": 281, "chapter": 3, "chapterName": "氣象", "numberInChapter": 18, "question": "遙控無人機通常應於下列哪種風向下起降？", "options": {"A": "順風。", "B": "側風。", "C": "逆風。", "D": "任何風向。"}, "answer": "C"}, {"id": 282, "chapter": 3, "chapterName": "氣象", "numberInChapter": 19, "question": "遙控無人飛機於逆風下起飛，不會有以下哪種特性？", "options": {"A": "增加穩定性。", "B": "增加操縱性。", "C": "減少起飛距離。", "D": "減少操縱性。"}, "answer": "D"}, {"id": 283, "chapter": 3, "chapterName": "氣象", "numberInChapter": 20, "question": "遙控無人機飛經下列哪個區域較易遭受亂流影響，且其亂流強度與周遭環境有密切關聯？", "options": {"A": "大草原區。", "B": "寬廣湖泊區。", "C": "平坦操場上空。", "D": "深山峽谷區。"}, "answer": "D"}, {"id": 284, "chapter": 3, "chapterName": "氣象", "numberInChapter": 21, "question": "當越強勁的風吹過多山地區時，背風面的風場會如何變化？", "options": {"A": "漸趨平穩。", "B": "有時平穩有時不平穩。", "C": "漸趨不平穩。", "D": "不變。"}, "answer": "C"}, {"id": 285, "chapter": 3, "chapterName": "氣象", "numberInChapter": 22, "question": "遙控無人機飛航活動期間，可能於任何高度遭遇不同風切狀況，其中以哪一項對其操控性影響最大？", "options": {"A": "超高空風切。", "B": "高空風切。", "C": "向量風切。", "D": "低空風切。"}, "answer": "D"}, {"id": 286, "chapter": 3, "chapterName": "氣象", "numberInChapter": 23, "question": "遙控無人機於起降階段突遇風速與風向之明顯改變，不會有下列哪種影響？", "options": {"A": "飛行姿態改變。", "B": "飛行軌跡改變。", "C": "所獲升力改變。", "D": "最大載重改變。"}, "answer": "D"}, {"id": 287, "chapter": 3, "chapterName": "氣象", "numberInChapter": 24, "question": "下列針對發生於臺灣地區低空風切之敘述，何者較為正確？", "options": {"A": "於鋒面過境時較為溫和，西南季風吹拂時較為強烈。", "B": "於鋒面過境時較為強烈，西南季風吹拂時較為溫和。", "C": "鋒面過境或西南季風吹拂時均為溫和。", "D": "鋒面過境或西南季風吹拂時均為強烈。"}, "answer": "B"}, {"id": 288, "chapter": 3, "chapterName": "氣象", "numberInChapter": 25, "question": "遙控無人機操作人於操作前及操作時需隨時注意天氣狀況，因天氣因素可能對無人機產生何種影響？", "options": {"A": "外觀美感。", "B": "飛行航向。", "C": "品牌知名度。", "D": "重量大小。"}, "answer": "B"}, {"id": 289, "chapter": 3, "chapterName": "氣象", "numberInChapter": 26, "question": "下列何種天氣現象，與大氣垂直運動無直接關係？", "options": {"A": "雷雨。", "B": "平流霧。", "C": "冰雹。", "D": "下爆氣流。"}, "answer": "B"}, {"id": 290, "chapter": 3, "chapterName": "氣象", "numberInChapter": 27, "question": "大氣穩定度與下列何項因子有直接關係？", "options": {"A": "空氣流動方向。", "B": "空氣中懸浮微粒大小。", "C": "水氣飽和程度。", "D": "空氣乾燥程度。"}, "answer": "A"}, {"id": 291, "chapter": 3, "chapterName": "氣象", "numberInChapter": 28, "question": "於地球表面某特殊地區所生成，具停留時間長且其水平方向之物理性質(如溫度及濕度) 等均為一致之廣大空氣體，稱之？", "options": {"A": "鋒面。", "B": "氣團。", "C": "颶風。", "D": "塔狀積雲。"}, "answer": "B"}, {"id": 292, "chapter": 3, "chapterName": "氣象", "numberInChapter": 29, "question": "下列哪個城市所處位置之氣候條件，較易發生午後雷陣雨？", "options": {"A": "東京。", "B": "新加坡。", "C": "莫斯科。", "D": "倫敦。"}, "answer": "B"}, {"id": 293, "chapter": 3, "chapterName": "氣象", "numberInChapter": 30, "question": "一定量空氣於一定溫度下，所能容納之下列何者亦有其限度？", "options": {"A": "PM2.5。", "B": "微生物。", "C": "水氣量。", "D": "細菌。"}, "answer": "C"}, {"id": 294, "chapter": 3, "chapterName": "氣象", "numberInChapter": 31, "question": "當空氣中水氣含量已達其最高限度時，此時相對溼度為何？", "options": {"A": "0.2。", "B": "0.4。", "C": "0.8。", "D": "1。"}, "answer": "D"}, {"id": 295, "chapter": 3, "chapterName": "氣象", "numberInChapter": 32, "question": "空氣能容納水氣量之多寡與下列何者有密切關係？", "options": {"A": "空氣含氧量。", "B": "空氣雜質含量。", "C": "溫度。", "D": "空氣惰性氣體成份。"}, "answer": "C"}, {"id": 296, "chapter": 3, "chapterName": "氣象", "numberInChapter": 33, "question": "已飽和之水氣如遇溫度持續下降，不會產生下列哪種現象？", "options": {"A": "霧。", "B": "雲。", "C": "雨滴。", "D": "風。"}, "answer": "D"}, {"id": 297, "chapter": 3, "chapterName": "氣象", "numberInChapter": 34, "question": "空氣中實際所含水氣量，與相同溫度下可含最大水氣量之百分比，稱為？", "options": {"A": "絕對濕度。", "B": "相對濕度。", "C": "同溫濕度。", "D": "實際濕度。"}, "answer": "B"}, {"id": 298, "chapter": 3, "chapterName": "氣象", "numberInChapter": 35, "question": "空氣中濕度越高，會導致下列哪種情形？", "options": {"A": "空氣的壓力越大。", "B": "空氣密度越低。", "C": "飛行器升力增加。", "D": "涼爽度提高。"}, "answer": "B"}, {"id": 299, "chapter": 3, "chapterName": "氣象", "numberInChapter": 36, "question": "當空氣溫度等於露點溫度時，即達到何種狀況？", "options": {"A": "水氣沸點。", "B": "水氣飽和點。", "C": "水氣熔點。", "D": "水氣蒸發點。"}, "answer": "B"}, {"id": 300, "chapter": 3, "chapterName": "氣象", "numberInChapter": 37, "question": "水汽飽和時不會產生下列哪種現象？", "options": {"A": "雲。", "B": "霧。", "C": "雨。", "D": "雷爆。"}, "answer": "D"}, {"id": 301, "chapter": 3, "chapterName": "氣象", "numberInChapter": 38, "question": "「霧」依其形成條件及特性分有不同種類，下列何者非常用之分類？", "options": {"A": "平流霧。", "B": "蒸氣霧。", "C": "鋒面霧。", "D": "高空霧。"}, "answer": "D"}, {"id": 302, "chapter": 3, "chapterName": "氣象", "numberInChapter": 39, "question": "有關平流霧之特點，下列何者為非？", "options": {"A": "日出後消散快速。", "B": "相對濕度較高。", "C": "不容易消散。", "D": "可能發生於沿海區域。"}, "answer": "A"}, {"id": 303, "chapter": 3, "chapterName": "氣象", "numberInChapter": 40, "question": "下列哪一種情況能有助於平流霧之消散？", "options": {"A": "風速變小。", "B": "風向轉變。", "C": "溫度升高。", "D": "濕度增高。"}, "answer": "B"}, {"id": 304, "chapter": 3, "chapterName": "氣象", "numberInChapter": 41, "question": "有關輻射霧之特點，下列何者為非？", "options": {"A": "日出後漸漸消散。", "B": "大都發生於冬季。", "C": "相較於平流霧比較不容易消散。", "D": "通常地面風速微弱、空氣穩定。"}, "answer": "C"}, {"id": 305, "chapter": 3, "chapterName": "氣象", "numberInChapter": 42, "question": "冷空氣因流經溫暖水面之蒸發作用使其中水氣增加，因而凝結成下列哪種霧的型態？", "options": {"A": "蒸氣霧。", "B": "輻射霧。", "C": "山坡霧。", "D": "鋒面霧。"}, "answer": "A"}, {"id": 306, "chapter": 3, "chapterName": "氣象", "numberInChapter": 43, "question": "蒸氣霧常出現於下列哪個季節？", "options": {"A": "春夏季節。", "B": "夏末季節。", "C": "秋冬季節。", "D": "春末季節。"}, "answer": "C"}, {"id": 307, "chapter": 3, "chapterName": "氣象", "numberInChapter": 44, "question": "於兩股不同性質氣團之交界面，當空氣自高空往下移動自近地面較冷空氣而凝結所成之霧，稱之？", "options": {"A": "鋒面霧。", "B": "山坡霧。", "C": "輻射霧。", "D": "蒸氣霧。"}, "answer": "A"}, {"id": 308, "chapter": 3, "chapterName": "氣象", "numberInChapter": 45, "question": "鋒面霧多伴隨何種天氣現象發生？", "options": {"A": "颱風。", "B": "鋒面。", "C": "雷陣雨。", "D": "龍捲風。"}, "answer": "B"}, {"id": 309, "chapter": 3, "chapterName": "氣象", "numberInChapter": 46, "question": "平流和輻射兩種物理過程亦可相輔相成，造成下列哪種霧的發生？", "options": {"A": "平流輻射霧。", "B": "山坡霧。", "C": "蒸氣霧。", "D": "鋒面霧。"}, "answer": "A"}, {"id": 310, "chapter": 3, "chapterName": "氣象", "numberInChapter": 47, "question": "當周遭空氣溫度下降至低於露點，水氣因此凝結成水滴並附著於地表或建築物上，其稱之？", "options": {"A": "雲。", "B": "露。", "C": "霧。", "D": "霜。"}, "answer": "B"}, {"id": 311, "chapter": 3, "chapterName": "氣象", "numberInChapter": 48, "question": "附著於航空器上之露珠若凝結成固態霜，對飛航安全有何影響？", "options": {"A": "對飛安有幫助。", "B": "對飛安可能造成危害。", "C": "對飛安並無影響。", "D": "對飛安有時可能造成危害有時無影響。"}, "answer": "B"}, {"id": 312, "chapter": 3, "chapterName": "氣象", "numberInChapter": 49, "question": "附著於機體表面的霜在飛行時不會產生下列哪種情形？", "options": {"A": "擾動流經機翼之空氣。", "B": "降低升力。", "C": "增加阻力。", "D": "增加飛航效率。"}, "answer": "D"}, {"id": 313, "chapter": 3, "chapterName": "氣象", "numberInChapter": 50, "question": "於大陸型氣候區域執行深秋早晨之飛行任務前，務必進行下列哪個程序以確保安全？", "options": {"A": "暖身程序。", "B": "點名程序。", "C": "除霜程序。", "D": "冥想程序。"}, "answer": "C"}, {"id": 314, "chapter": 3, "chapterName": "氣象", "numberInChapter": 51, "question": "雲有下列哪幾種型態？", "options": {"A": "積狀雲。", "B": "層狀雲。", "C": "卷狀雲。", "D": "以上皆是。"}, "answer": "D"}, {"id": 315, "chapter": 3, "chapterName": "氣象", "numberInChapter": 52, "question": "雲的型態依據雲所在的高度可以分成下列哪幾種？", "options": {"A": "高雲族。", "B": "中雲族。", "C": "低雲族。", "D": "以上皆是。"}, "answer": "D"}, {"id": 316, "chapter": 3, "chapterName": "氣象", "numberInChapter": 53, "question": "高雲族高度大約在6,000公尺以上，主要有下列哪幾種？", "options": {"A": "卷雲。", "B": "卷層雲。", "C": "卷積雲。", "D": "以上皆是。"}, "answer": "D"}, {"id": 317, "chapter": 3, "chapterName": "氣象", "numberInChapter": 54, "question": "中雲族高度大約在2,000~6,000公尺，主要有下列哪幾種？", "options": {"A": "高積雲。", "B": "高層雲。", "C": "雨層雲。", "D": "以上皆是。"}, "answer": "D"}, {"id": 318, "chapter": 3, "chapterName": "氣象", "numberInChapter": 55, "question": "低雲族高度位於2,000公尺以下，包含下列哪幾種？", "options": {"A": "積雲。", "B": "層雲。", "C": "層積雲。", "D": "以上皆是。"}, "answer": "D"}, {"id": 319, "chapter": 3, "chapterName": "氣象", "numberInChapter": 56, "question": "下列何者為常見氣團分類方式？", "options": {"A": "依其源地緯度高或低。", "B": "依其源地為大陸或海洋。", "C": "依其所經地面為冷空氣或暖空氣。", "D": "以上皆是。"}, "answer": "D"}, {"id": 320, "chapter": 3, "chapterName": "氣象", "numberInChapter": 57, "question": "氣團本身冷於周遭空氣稱為？", "options": {"A": "暖氣團。", "B": "冷氣團。", "C": "冰氣團。", "D": "熱氣團。"}, "answer": "B"}, {"id": 321, "chapter": 3, "chapterName": "氣象", "numberInChapter": 58, "question": "氣團穩定度決定其籠罩區域的哪種形態？", "options": {"A": "社會形態。", "B": "經濟形態。", "C": "天氣形態。", "D": "政治形態。"}, "answer": "C"}, {"id": 322, "chapter": 3, "chapterName": "氣象", "numberInChapter": 59, "question": "在鋒面兩側的下列哪種現象通常均有明顯的差異？", "options": {"A": "溫度。", "B": "濕度。", "C": "風、天氣。", "D": "以上皆是。"}, "answer": "D"}, {"id": 323, "chapter": 3, "chapterName": "氣象", "numberInChapter": 60, "question": "當冷空氣前進，迫使暖空氣後退而取代暖空氣原有位置，則此時產生之鋒面稱為？", "options": {"A": "滯留鋒。", "B": "暖鋒。", "C": "冷鋒。", "D": "囚錮鋒。"}, "answer": "C"}, {"id": 324, "chapter": 3, "chapterName": "氣象", "numberInChapter": 61, "question": "當冷暖氣團勢均力敵以致使鋒面呈滯留狀態，此時之鋒面稱為？", "options": {"A": "暖鋒。", "B": "滯留鋒。", "C": "冷鋒。", "D": "囚錮鋒。"}, "answer": "B"}, {"id": 325, "chapter": 3, "chapterName": "氣象", "numberInChapter": 62, "question": "遙控無人機飛經各鋒面區時，可能遭遇下列何項劇烈變化？", "options": {"A": "溫度。", "B": "濕度。", "C": "風向。", "D": "以上皆是。"}, "answer": "D"}, {"id": 326, "chapter": 3, "chapterName": "氣象", "numberInChapter": 63, "question": "遙控無人機於山區飛行時若遇強風，則可選擇何處飛行相較為平順？", "options": {"A": "背風面。", "B": "側風面。", "C": "迎風面。", "D": "以上皆非。"}, "answer": "C"}, {"id": 327, "chapter": 3, "chapterName": "氣象", "numberInChapter": 64, "question": "遙控無人機於山區飛行時，過了山巔需注意沿何方向所產生之亂流？", "options": {"A": "側風面。", "B": "背風面。", "C": "迎風面。", "D": "以上皆非。"}, "answer": "B"}, {"id": 328, "chapter": 3, "chapterName": "氣象", "numberInChapter": 65, "question": "遙控無人機飛越可見水氣（如雨或雲）時，需注意哪個部位可能發生積冰現象？", "op
